// Global listener registry so cloud updates re-render the right hooks
const _cloudListeners = {};
function _addCloudListener(key, fn) {
  if (!_cloudListeners[key]) _cloudListeners[key] = new Set();
  _cloudListeners[key].add(fn);
  return () => _cloudListeners[key].delete(fn);
}
function _notifyCloud(key, val) {
  _cloudListeners[key]?.forEach(fn => fn(val));
}

// Debounced batch-write to Supabase (avoids hammering DB on rapid state changes)
const _pending = {};
let _syncTimer = null;
let _syncStatus = 'idle';
const _syncStatusListeners = new Set();
function _setSyncStatus(s) { _syncStatus = s; _syncStatusListeners.forEach(fn => fn(s)); }

async function _flush() {
  if (!_sb) return;
  const rows = Object.entries(_pending).map(([key, value]) => ({ key, value }));
  if (!rows.length) return;
  Object.keys(_pending).forEach(k => delete _pending[k]);
  _setSyncStatus('syncing');
  const { error } = await _sb.from('dashboard_data').upsert(rows, { onConflict: 'key' });
  _setSyncStatus(error ? 'error' : 'synced');
  setTimeout(() => _setSyncStatus('idle'), 2000);
}

function _scheduleSync(key, val) {
  if (!_sbEnabled) return;
  _pending[key] = val;
  clearTimeout(_syncTimer);
  _syncTimer = setTimeout(_flush, 1200);
}

// Pull all data from cloud on startup and subscribe to real-time changes
async function _initCloudSync() {
  if (!_sb) return;
  _setSyncStatus('syncing');
  const { data } = await _sb.from('dashboard_data').select('key, value');
  if (data) {
    data.forEach(({ key, value }) => {
      try { localStorage.setItem(key, JSON.stringify(value)); } catch {}
      _notifyCloud(key, value);
    });
  }
  _setSyncStatus('synced');
  setTimeout(() => _setSyncStatus('idle'), 1500);

  // Real-time: when another device saves, update this one instantly
  _sb.channel('dashboard_sync')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'dashboard_data' }, ({ new: row }) => {
      if (!row?.key) return;
      try { localStorage.setItem(row.key, JSON.stringify(row.value)); } catch {}
      _notifyCloud(row.key, row.value);
    })
    .subscribe();
}

function useSyncStatus() {
  const [s, setS] = useState(_syncStatus);
  useEffect(() => { _syncStatusListeners.add(setS); return () => _syncStatusListeners.delete(setS); }, []);
  return s;
}

// ── localStorage hook with cloud sync ─────────────────────
function useLS(key, init) {
  const [val, setVal] = useState(() => {
    try { const s = localStorage.getItem(key); return s !== null ? JSON.parse(s) : init; } catch { return init; }
  });

  // Re-render when cloud pushes an update for this key
  useEffect(() => _addCloudListener(key, (newVal) => setVal(newVal)), [key]);

  const setValue = useCallback((newVal) => {
    setVal(newVal);
    try { localStorage.setItem(key, JSON.stringify(newVal)); } catch {}
    _scheduleSync(key, newVal);
  }, [key]);

  return [val, setValue];
}

function calcStreak(habitId, history) {
  let streak = 0, today = new Date();
  for (let i = 0; i < 365; i++) {
    const d = new Date(today); d.setDate(d.getDate() - i);
    const k = d.toISOString().split('T')[0];
    if (history[k]?.[habitId]) streak++; else break;
  }
  return streak;
}

// ── SVG Ring ─────────────────────────────────────────────
function Ring({ value, max, size = 100, sw = 10, color = '#3b82f6', children }) {
  const r = (size - sw) / 2, circ = 2 * Math.PI * r;
  const pct = Math.min(Math.max(value / max, 0), 1);
  const offset = circ * (1 - pct);
  return h('div', { style: { position: 'relative', width: size, height: size } },
    h('svg', { width: size, height: size, style: { transform: 'rotate(-90deg)', display: 'block' } },
      h('circle', { className: 'ring-track', cx: size/2, cy: size/2, r, strokeWidth: sw }),
      h('circle', { className: 'ring-fill', cx: size/2, cy: size/2, r, stroke: color, strokeWidth: sw, strokeDasharray: circ, strokeDashoffset: offset })
    ),
    children && h('div', { style: { position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center' } }, children)
  );
}

// ── Modal ─────────────────────────────────────────────────
function Modal({ open, onClose, title, children }) {
  useEffect(() => {
    if (!open) return;
    const h = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, [open, onClose]);
  if (!open) return null;
  return h('div', { className: 'modal-backdrop', onClick: (e) => e.target === e.currentTarget && onClose() },
    h('div', { className: 'modal-box' },
      h('div', { style: { display:'flex', alignItems:'center', justifyContent:'space-between', padding:'1rem 1.25rem', borderBottom:'1px solid #222' } },

      ),
      h('div', { className: 'modal-body' }, children)
    )
  );
}

function ExerciseCard({ name, sets, onAddSet, onRemoveSet }) {
  const [open, setOpen] = useState(false);
  const [weight, setWeight] = useState('');
  const [reps, setReps] = useState('');
  const addSet = () => { if (!weight || !reps) return; onAddSet({ weight:+weight, reps:+reps }); setWeight(''); setReps(''); };

  return h('div', { style: { border:'1px solid #1e1e1e', borderRadius:12, overflow:'hidden' } },
    h('button', { onClick:()=>setOpen(!open), style:{ width:'100%', display:'flex', alignItems:'center', justifyContent:'space-between', padding:'12px 16px', background:'#1a1a1a', border:'none', cursor:'pointer', textAlign:'left' } },
      h('div', { style: { display:'flex', alignItems:'center', gap:10 } },
        h('span', { style: { fontSize:12, fontWeight:500, color:'#e5e5e5' } }, name),
        sets.length > 0 && h('span', { style: { background:'rgba(59,130,246,0.2)', color:'#60a5fa', fontSize:10, fontWeight:700, padding:'2px 8px', borderRadius:999 } }, sets.length + ' sets')
      ),
      h('span', { style: { color:'#525252', fontSize:16 } }, open ? '▲' : '▼')
    ),
    open && h('div', { style: { padding:'12px 16px', background:'#141414', display:'flex', flexDirection:'column', gap:10 } },
      sets.length > 0 && h('div', { style: { display:'flex', flexWrap:'wrap', gap:8 } },
        sets.map((s,i) => h('div', { key:i, style: { display:'flex', alignItems:'center', gap:6, background:'#1e1e1e', borderRadius:8, padding:'6px 10px', fontSize:11 } },
          h('span', { style: { color:'white', fontWeight:700 } }, `${s.weight}kg × ${s.reps}`),
          h('button', { onClick:()=>onRemoveSet(i), style:{ background:'none', border:'none', color:'#404040', cursor:'pointer', fontSize:14, lineHeight:1 } }, '×')
        ))

      h('div', { style: { display:'flex', gap:8 } },
        h('input', { type:'number', min:'0', placeholder:'kg', className:'input', style:{flex:1}, value:weight, onChange:e=>setWeight(e.target.value) }),
        h('input', { type:'number', min:'0', placeholder:'reps', className:'input', style:{flex:1}, value:reps, onChange:e=>setReps(e.target.value), onKeyDown:e=>e.key==='Enter'&&addSet() }),
        h('button', { onClick:addSet, style:{ background:'#2563eb', color:'white', border:'none', borderRadius:10, padding:'0 14px', cursor:'pointer', fontSize:18 } }, '+')

}

function SleepTracker() {
  const today = getToday();
  const [sleepLog, setSleepLog] = useLS('sleepLog', {});
  const [input, setInput] = useState('');
  const days = getLast7();
  const data = days.map(d => ({ label:new Date(d+'T00:00:00').toLocaleDateString('nl-BE',{weekday:'short'}), hours:sleepLog[d]??null }));
  const valid = data.filter(d=>d.hours!==null).map(d=>d.hours);
  const avg = valid.length ? (valid.reduce((a,b)=>a+b,0)/valid.length).toFixed(1) : '-';
  const maxH = Math.max(...valid, 8);
  const barColor = h => h===null?'#222':h<6?'#ef4444':h<7?'#f59e0b':'#22c55e';

  const logSleep = () => {
    const h = parseFloat(input);
    if (!h||h<0||h>24) return;
    setSleepLog({...sleepLog,[today]:h});
    setInput('');
  };

  return h('div', { className:'card' },
    h('div', { style: { display:'flex', alignItems:'center', justifyContent:'space-between', padding:'1rem 1rem 0.5rem' } },
      h('div', null,
        h('h2', { style: { fontSize:12, fontWeight:700, color:'#d4d4d4', letterSpacing:'0.08em', textTransform:'uppercase', margin:0 } }, 'Slaap'),
        h('p', { style: { fontSize:11, color:'#525252', margin:0 } }, `Doel: 7–8u · Gem: ${avg}u`)
      )
    ),
    h('div', { className:'card-inner' },
      h('div', { style: { display:'flex', gap:8, marginBottom:16 } },
        h('input', { className:'input', style:{flex:1}, type:'number', min:'0', max:'24', step:'0.5', placeholder: sleepLog[today] ? `Vandaag: ${sleepLog[today]}u` : 'Uren geslapen…', value:input, onChange:e=>setInput(e.target.value), onKeyDown:e=>e.key==='Enter'&&logSleep() }),
        h('button', { onClick:logSleep, style:{ background:'#2563eb', color:'white', border:'none', borderRadius:12, padding:'0 16px', cursor:'pointer', fontWeight:700, fontFamily:'inherit' } }, 'Log')
      ),
      // Bar chart (SVG)
      h('div', { style: { height:80, display:'flex', alignItems:'flex-end', gap:4, marginBottom:8 } },
        data.map((d,i) => h('div', { key:i, style: { flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:4, height:'100%', justifyContent:'flex-end' } },
          h('div', { style: { width:'100%', borderRadius:'3px 3px 0 0', background:barColor(d.hours), height: d.hours ? `${(d.hours/maxH)*100}%` : '8%', minHeight:4, transition:'height 0.5s ease' } })
        ))
      ),
      h('div', { style: { display:'flex', justifyContent:'space-around', marginBottom:12 } },
        data.map((d,i) => h('div', { key:i, style: { textAlign:'center' } },
          h('div', { style: { fontSize:10, color:'#525252', textTransform:'capitalize', marginBottom:2 } }, d.label.slice(0,2)),
          h('div', { style: { fontSize:10, fontWeight:700, color:barColor(d.hours) } }, d.hours!==null ? d.hours+'u' : '–')
        ))
      ),
      h('div', { style: { display:'flex', gap:16, justifyContent:'center' } },
        [['#ef4444','< 6u'],['#f59e0b','6–7u'],['#22c55e','7u+']].map(([c,l]) =>
          h('div', { key:l, style: { display:'flex', alignItems:'center', gap:6, fontSize:10, color:'#737373' } },
            h('div', { style: { width:8, height:8, borderRadius:2, background:c } }),
            l
          )
        )
      )
    )
  );
}

function urgencyStyle(days) {
  if (days < 0)  return { color:'#6b7280', badge:{ background:'#1a1a1a', color:'#6b7280' } };
  if (days <= 3) return { color:'#ef4444', badge:{ background:'rgba(239,68,68,0.15)', color:'#f87171' } };
  if (days <= 7) return { color:'#f59e0b', badge:{ background:'rgba(245,158,11,0.15)', color:'#fbbf24' } };
  return          { color:'#22c55e', badge:{ background:'rgba(34,197,94,0.15)', color:'#4ade80' } };
}

function DeadlineTracker() {
  const seed = mkSeed();
  const [deadlines, setDeadlines] = useLS('schoolDeadlines', seed.deadlines);
  const [modal, setModal] = useState(false);
  const [form, setForm] = useState({ title:'', date:'', tags:[] });

  const sorted = [...deadlines].sort((a,b) => { if (a.completed!==b.completed) return a.completed?1:-1; return new Date(a.date)-new Date(b.date); });

  const add = () => {
    if (!form.title||!form.date) return;
    setDeadlines([...deadlines, { id:genId(), ...form, completed:false }]);
    setForm({ title:'', date:'', tags:[] });
    setModal(false);
  };

  return h('div', { className:'card' },
    h('div', { style:{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'1rem 1rem 0.5rem' } },
      h('h2', { style:{ fontSize:12, fontWeight:700, color:'#d4d4d4', letterSpacing:'0.08em', textTransform:'uppercase', margin:0 } }, 'Deadlines'),
      h('button', { onClick:()=>setModal(true), style:{ display:'flex', alignItems:'center', gap:4, background:'#1e1e1e', color:'#d4d4d4', fontSize:12, fontWeight:500, padding:'6px 12px', borderRadius:8, border:'none', cursor:'pointer' } }, '+ Toevoegen')
    ),
    h('div', { className:'card-inner', style:{ display:'flex', flexDirection:'column', gap:8 } },
      sorted.length===0 && h('p', { style:{ textAlign:'center', color:'#525252', fontSize:13, padding:16 } }, 'Geen deadlines'),
      sorted.map(item => {
        const days = daysUntil(item.date);
        const { color, badge } = urgencyStyle(days);
        const label = days<0?'Verlopen':days===0?'Vandaag!':days+'d';
        return h('div', { key:item.id, style:{ display:'flex', alignItems:'flex-start', gap:12, padding:12, borderRadius:12, border:'1px solid', opacity:item.completed?0.5:1,
          borderColor: item.completed?'#1a1a1a':'#1e1e1e', borderLeftColor:item.completed?undefined:color, borderLeftWidth:2 } },
          h('button', { onClick:()=>setDeadlines(deadlines.map(d=>d.id===item.id?{...d,completed:!d.completed}:d)),
            style:{ width:20, height:20, borderRadius:'50%', border:`2px solid ${item.completed?'#22c55e':'#333'}`, background:item.completed?'#22c55e':'none', display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', flexShrink:0, marginTop:2 } },
            item.completed && h('span', { style:{color:'white',fontSize:10,fontWeight:900} }, '✓')
          ),
          h('div', { style:{ flex:1, minWidth:0 } },
            h('p', { style:{ fontSize:13, fontWeight:500, color:item.completed?'#525252':'#e5e5e5', textDecoration:item.completed?'line-through':'none', margin:0 } }, item.title),
            h('div', { style:{ display:'flex', flexWrap:'wrap', alignItems:'center', gap:6, marginTop:6 } },
              h('span', { style:{ fontSize:10, fontWeight:700, padding:'2px 8px', borderRadius:999, ...badge } }, label),
              h('span', { style:{ fontSize:10, color:'#525252' } }, fmtDate(item.date)),
              item.tags.map(t=>h('span',{key:t,style:{fontSize:10,background:'#1e1e1e',color:'#737373',padding:'2px 8px',borderRadius:999}},t))
            )
          ),
          h('button', { onClick:()=>setDeadlines(deadlines.filter(d=>d.id!==item.id)), style:{background:'none',border:'none',color:'#404040',cursor:'pointer',fontSize:16} }, '×')
        );
      })
    ),
    h(Modal, { open:modal, onClose:()=>setModal(false), title:'Nieuwe deadline' },
      h(Field,{label:'Titel'}, h('input',{className:'input',placeholder:'bijv. AR Museum rapport',value:form.title,onChange:e=>setForm({...form,title:e.target.value})})),
      h(Field,{label:'Datum'}, h('input',{className:'input',type:'date',value:form.date,onChange:e=>setForm({...form,date:e.target.value})})),
      h(Field,{label:'Tags'}, h(TagPicker,{tags:SCHOOL_TAGS,selected:form.tags,onToggle:t=>setForm({...form,tags:form.tags.includes(t)?form.tags.filter(x=>x!==t):[...form.tags,t]})})),
      h('button',{className:'btn-primary',onClick:add},'Deadline toevoegen')
    )

}

function ProjectTracker() {
  const seed = mkSeed();
  const [projects, setProjects] = useLS('schoolProjects', seed.projects);
  const [modal, setModal] = useState(false);
  const [expanded, setExpanded] = useState(null);
  const [form, setForm] = useState({ title:'', description:'', tags:[], subtaskInput:'', subtasks:[] });

  const toggleTask = (pid, tid) => setProjects(projects.map(p => p.id!==pid?p:{ ...p, subtasks:p.subtasks.map(s=>s.id!==tid?s:{...s,completed:!s.completed}) }));

  const addSubtask = () => {
    if (!form.subtaskInput.trim()) return;
    setForm({...form, subtasks:[...form.subtasks,{id:genId(),title:form.subtaskInput.trim(),completed:false}], subtaskInput:''});
  };

  const add = () => {
    if (!form.title) return;
    setProjects([...projects,{id:genId(),title:form.title,description:form.description,tags:form.tags,subtasks:form.subtasks}]);
    setForm({title:'',description:'',tags:[],subtaskInput:'',subtasks:[]});
    setModal(false);

  return h('div', { className:'card' },
    h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'1rem 1rem 0.5rem'}},

    ),

        const pct=total?Math.round(done/total*100):0;

            // Mini ring

              h('svg',{width:36,height:36,style:{transform:'rotate(-90deg)',display:'block'}},
                h('circle',{cx:18,cy:18,r:14,fill:'none',stroke:'#262626',strokeWidth:4}),
                h('circle',{cx:18,cy:18,r:14,fill:'none',stroke:'#3b82f6',strokeWidth:4,strokeDasharray:2*Math.PI*14,strokeDashoffset:2*Math.PI*14*(1-pct/100),strokeLinecap:'round',style:{transition:'stroke-dashoffset 0.5s ease'}})
              ),
              h('div',{style:{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center'}},
                h('span',{style:{fontSize:9,fontWeight:700,color:'white'}},pct+'%')
              )
            ),
            h('div',{style:{flex:1,minWidth:0}},
              h('p',{style:{fontSize:13,fontWeight:600,color:'#e5e5e5',margin:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},p.title),
              h('p',{style:{fontSize:10,color:'#525252',margin:0}},`${done}/${total} subtaken`)
            ),
            h('span',{style:{color:'#525252',fontSize:14,flexShrink:0}},isOpen?'▲':'▼')
          ),
          isOpen && h('div',{style:{padding:'12px 16px',background:'#141414'}},
            p.description && h('p',{style:{fontSize:11,color:'#525252',marginBottom:10,marginTop:0}},p.description),
            h('div',{style:{display:'flex',flexDirection:'column',gap:8}},
              p.subtasks.map(s=>h('button',{key:s.id,onClick:()=>toggleTask(p.id,s.id),style:{display:'flex',alignItems:'center',gap:12,background:'none',border:'none',cursor:'pointer',width:'100%',padding:0}},
                h('div',{style:{width:16,height:16,borderRadius:'50%',border:`2px solid ${s.completed?'#3b82f6':'#333'}`,background:s.completed?'#3b82f6':'none',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,transition:'all 0.15s'}},
                  s.completed&&h('span',{style:{color:'white',fontSize:8,fontWeight:900}},'✓')

                h('span',{style:{fontSize:12,color:s.completed?'#525252':'#d4d4d4',textDecoration:s.completed?'line-through':'none',textAlign:'left'}},s.title)

            )
          )

      }),
      projects.length===0&&h('p',{style:{textAlign:'center',color:'#525252',fontSize:13,padding:16}},'Geen projecten')
    ),
    h(Modal,{open:modal,onClose:()=>setModal(false),title:'Nieuw project'},

          h('button',{onClick:()=>setForm({...form,subtasks:form.subtasks.filter((_,j)=>j!==i)}),style:{background:'none',border:'none',color:'#404040',cursor:'pointer',fontSize:14}},'×')
        ))

      h('button',{className:'btn-primary',onClick:add},'Project aanmaken')

  );
}

const DAYS=['ma','di','wo','do','vr','za','zo'];
const DAY_LABELS={ma:'Maandag',di:'Dinsdag',wo:'Woensdag',do:'Donderdag',vr:'Vrijdag',za:'Zaterdag',zo:'Zondag'};

function WeeklyTodos() {
  const seed=mkSeed();
  const [todos,setTodos]=useLS('weeklyTodos',seed.weeklyTodos);
  const [modal,setModal]=useState(false);
  const [form,setForm]=useState({title:'',day:'ma'});
  const todayDow=['zo','ma','di','wo','do','vr','za'][new Date().getDay()];

  return h('div',{className:'card'},
    h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'1rem 1rem 0.5rem'}},
      h('h2',{style:{fontSize:12,fontWeight:700,color:'#d4d4d4',letterSpacing:'0.08em',textTransform:'uppercase',margin:0}},'Weekplanning'),
      h('button',{onClick:()=>setModal(true),style:{display:'flex',alignItems:'center',gap:4,background:'#1e1e1e',color:'#d4d4d4',fontSize:12,fontWeight:500,padding:'6px 12px',borderRadius:8,border:'none',cursor:'pointer'}},'+ Toevoegen')
    ),
    h('div',{className:'card-inner',style:{display:'flex',flexDirection:'column',gap:16}},
      DAYS.map(day=>{
        const dt=todos.filter(t=>t.day===day);
        if(!dt.length) return null;
        const isToday=day===todayDow;
        return h('div',{key:day},
          h('p',{style:{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.1em',color:isToday?'#60a5fa':'#525252',marginBottom:6,marginTop:0}},DAY_LABELS[day]+(isToday?' · Vandaag':'')),
          h('div',{style:{display:'flex',flexDirection:'column',gap:6}},
            dt.map(t=>h('div',{key:t.id,style:{display:'flex',alignItems:'center',gap:10}},

function DailyHabits() {
  const today=getToday();
  const [habits,setHabits]=useLS('dailyHabits',{});
  const td=habits[today]||{};
  const toggle=id=>setHabits({...habits,[today]:{...td,[id]:!td[id]}});
  const doneCount=DAILY_HABITS.filter(h=>td[h.id]).length;
  const pct=Math.round(doneCount/DAILY_HABITS.length*100);

  return h('div',{className:'card'},
    h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'1rem 1rem 0.5rem'}},
      h('div',null,
        h('h2',{style:{fontSize:12,fontWeight:700,color:'#d4d4d4',letterSpacing:'0.08em',textTransform:'uppercase',margin:0}},'Dagelijkse gewoontes'),
        h('p',{style:{fontSize:11,color:'#525252',margin:0}},`${doneCount} / ${DAILY_HABITS.length} vandaag`)
      )
    ),
    h('div',{className:'card-inner'},
      h('div',{style:{display:'flex',alignItems:'center',gap:12,marginBottom:12}},
        h('div',{className:'progress-bar',style:{flex:1}},
          h('div',{className:'progress-fill',style:{width:pct+'%',background:pct===100?'#22c55e':'#3b82f6'}})
        ),
        h('span',{style:{fontSize:12,fontWeight:700,color:pct===100?'#4ade80':'#737373',minWidth:40}},pct+'%'+(pct===100?' 🔥':''))
      ),
      h('div',{style:{display:'flex',flexDirection:'column',gap:6}},
        DAILY_HABITS.map(habit=>{
          const checked=!!td[habit.id], streak=calcStreak(habit.id,habits);
          return h('button',{key:habit.id,onClick:()=>toggle(habit.id),className:`habit-row${checked?' checked':''}`,
            style:{display:'flex',alignItems:'center',gap:12,padding:12,borderRadius:12,border:`1px solid ${checked?'rgba(34,197,94,0.2)':'#1e1e1e'}`,cursor:'pointer',background:checked?'rgba(34,197,94,0.05)':'#1a1a1a',width:'100%',textAlign:'left',fontFamily:'inherit'}},
            h('div',{style:{width:24,height:24,borderRadius:'50%',border:`2px solid ${checked?'#22c55e':'#333'}`,background:checked?'#22c55e':'none',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,transition:'all 0.15s',boxShadow:checked?'0 0 8px rgba(34,197,94,0.4)':'none'}},
              checked&&h('span',{style:{color:'white',fontSize:9,fontWeight:900}},'✓')
            ),
            h('span',{style:{fontSize:16,lineHeight:1}},habit.icon),
            h('span',{style:{flex:1,fontSize:13,color:checked?'#d4d4d4':'#737373'}},habit.label),
            streak>0&&h('div',{style:{display:'flex',alignItems:'center',gap:4,fontSize:12,fontWeight:700,color:checked?'#fb923c':'#525252'}},
              '🔥 ',streak
            )
          );
        })
      )
    )
  );
}

function WeightTracker() {
  const seed=mkSeed();
  const [log,setLog]=useLS('weightLog',seed.weightLog);

  const [form,setForm]=useState({weight:'',date:getToday()});
  const sorted=[...log].sort((a,b)=>a.date.localeCompare(b.date));
  const current=sorted.at(-1)?.weight??76;
  const lost=Math.max(0,76-current), toGo=Math.max(0,current-70), total=6;
  const pct=Math.round(Math.min(lost/total,1)*100);

  return h('div',{className:'card'},
    h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'1rem 1rem 0.5rem'}},
      h('div',null,
        h('h2',{style:{fontSize:12,fontWeight:700,color:'#d4d4d4',letterSpacing:'0.08em',textTransform:'uppercase',margin:0}},'Gewicht'),

    ),
    h('div',{className:'card-inner'},
      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,marginBottom:14}},
        [['Huidig',current+'kg','#3b82f6'],['Verloren','-'+lost.toFixed(1)+'kg','#22c55e'],['Nog te gaan',toGo.toFixed(1)+'kg','#f59e0b']].map(([l,v,c])=>
          h('div',{key:l,style:{background:'#1a1a1a',borderRadius:12,padding:'10px',textAlign:'center'}},
            h('p',{style:{fontSize:10,color:'#525252',marginBottom:4,marginTop:0}},l),
            h('p',{style:{fontSize:15,fontWeight:900,color:c,margin:0}},v)
          )
        )
      ),
      h('div',{style:{marginBottom:6}},
        h('div',{style:{display:'flex',justifyContent:'space-between',fontSize:10,color:'#525252',marginBottom:6}},
          h('span',null,'76kg'),
          h('span',{style:{color:'#60a5fa',fontWeight:700}},pct+'% bereikt'),
          h('span',null,'70kg')
        ),
        h('div',{style:{height:12,background:'#1e1e1e',borderRadius:999,overflow:'hidden'}},
          h('div',{style:{height:'100%',borderRadius:999,background:'linear-gradient(90deg,#3b82f6,#22c55e)',width:pct+'%',transition:'width 1s ease'}})
        )
      )
    ),
    h(Modal,{open:modal,onClose:()=>setModal(false),title:'Gewicht loggen'},

      h(Field,{label:'Datum'},h('input',{className:'input',type:'date',value:form.date,onChange:e=>setForm({...form,date:e.target.value})})),
      h('button',{className:'btn-primary',onClick:()=>{const w=parseFloat(form.weight);if(!w)return;setLog([...log,{id:genId(),date:form.date,weight:w}]);setForm({weight:'',date:getToday()});setModal(false);}},'Opslaan')
    )

          h('span',{style:{fontSize:18,fontWeight:900,color:'white',lineHeight:1}},avg.toFixed(1)),
          h('span',{style:{fontSize:10,color:'#737373'}},'uur')

        h('div',{style:{flex:1,display:'flex',flexDirection:'column',gap:12}},

            h('div',{style:{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:6}},
              h('span',{style:{color:'#737373'}},'7-daags gemiddelde'),

            ),
            h('div',{className:'progress-bar'},h('div',{className:'progress-fill',style:{width:pct+'%',background:ringColor}}))
          ),
          h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}},
            h('div',{style:{background:'#1a1a1a',borderRadius:12,padding:'10px',textAlign:'center'}},
              h('p',{style:{fontSize:10,color:'#525252',margin:'0 0 4px'}},'Doel'),

            ),
            h('div',{style:{background:'#1a1a1a',borderRadius:12,padding:'10px',textAlign:'center'}},
              h('p',{style:{fontSize:10,color:'#525252',margin:'0 0 4px'}},'Tekort/nacht'),
              h('p',{style:{fontSize:13,fontWeight:700,color:'#fbbf24',margin:0}},avg<7?'-'+(7-avg).toFixed(1)+'u':'✓')

      )
    )
  );
}

    h('div',{className:'card-inner',style:{display:'flex',flexDirection:'column',gap:12}},
      streaks.every(s=>s.streak===0)&&h('p',{style:{textAlign:'center',color:'#525252',fontSize:13,padding:8}},'Begin vandaag je streaks! 🚀'),
      streaks.map(sh=>h('div',{key:sh.id,style:{display:'flex',alignItems:'center',gap:10}},
        h('span',{style:{fontSize:16,width:24,textAlign:'center'}},sh.icon),
        h('div',{style:{flex:1}},
          h('div',{style:{display:'flex',justifyContent:'space-between',fontSize:11,marginBottom:4}},
            h('span',{style:{color:'#737373',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:'70%'}},sh.label),
            h('span',{style:{fontWeight:700,color:sh.streak>0?'#fb923c':'#404040',display:'flex',alignItems:'center',gap:4}},sh.streak>0&&'🔥 ',sh.streak+'d')
          ),
          h('div',{className:'progress-bar'},
            h('div',{className:'progress-fill',style:{width:Math.min(sh.streak/30,1)*100+'%',background:sh.streak>=7?'linear-gradient(90deg,#f59e0b,#ef4444)':'#3b82f6'}})
          )
        )
      ))
    )
  );
}

function GoalsSection() {
  return h('div',null,h(DailyHabits),h(WeightTracker),h(SleepGoalCard),h(StreakCard));
}

// ══════════════════════════════════════════════════════════
//  MAIN APP
// ══════════════════════════════════════════════════════════

const TABS = [
  { id:'school',  label:'School',  icon:'🎓' },
  { id:'sport',   label:'Sport',   icon:'💪' },
  { id:'hobbies', label:"Hobby's", icon:'⚡' },
  { id:'goals',   label:'Goals',   icon:'🎯' },
];

function App() {
  const [tab, setTab] = useState('sport');
  const syncStatus = useSyncStatus();
  const now = new Date();
  const hr = now.getHours();
  const greeting = hr<12?'Goedemorgen':hr<18?'Goedenmiddag':'Goedenavond';
  const dateLabel = now.toLocaleDateString('nl-BE',{weekday:'long',day:'numeric',month:'long'});

  // Pull data from cloud on first load
  useEffect(() => { _initCloudSync(); }, []);

  const syncDot = _sbEnabled ? h('div', {
    title: syncStatus === 'syncing' ? 'Synchroniseren…' : syncStatus === 'synced' ? 'Gesynchroniseerd' : syncStatus === 'error' ? 'Sync fout' : 'Sync actief',
    style: {
      width: 8, height: 8, borderRadius: '50%', flexShrink: 0,
      background: syncStatus === 'syncing' ? '#f59e0b' : syncStatus === 'error' ? '#ef4444' : syncStatus === 'synced' ? '#22c55e' : '#3b82f6',
      boxShadow: syncStatus === 'syncing' ? '0 0 6px #f59e0b' : syncStatus === 'synced' ? '0 0 6px #22c55e' : 'none',
      animation: syncStatus === 'syncing' ? 'pulse 1s infinite' : 'none',
    }
  }) : null;

  return h('div', { style:{ minHeight:'100vh', background:'#0a0a0a', color:'white', userSelect:'none' } },
    // Header
    h('header', { style:{ position:'sticky', top:0, zIndex:40, background:'rgba(10,10,10,0.92)', backdropFilter:'blur(20px)', borderBottom:'1px solid #1c1c1c' } },
      h('div', { style:{ maxWidth:900, margin:'0 auto', padding:'0 16px' } },
        h('div', { style:{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'12px 0' } },
          h('div', null,
            h('p', { style:{ fontSize:11, color:'#525252', textTransform:'capitalize', letterSpacing:'0.04em', margin:0 } }, dateLabel),
            h('h1', { style:{ fontSize:18, fontWeight:800, letterSpacing:'-0.02em', margin:0, marginTop:2 } },
              greeting + ', ',
              h('span', { style:{ background:'linear-gradient(90deg,#60a5fa,#93c5fd)', WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent' } }, 'Jonas'),
              ' 👊'
            )
          ),
          h('div', { style:{ display:'flex', alignItems:'center', gap:10 } },
            syncDot,
            h('div', { style:{ width:36, height:36, borderRadius:'50%', background:'linear-gradient(135deg,#2563eb,#4f46e5)', display:'flex', alignItems:'center', justifyContent:'center', fontWeight:700, fontSize:14 } }, 'J')
          )
        ),
        // Desktop tabs
        h('div', { style:{ display:'flex', gap:4, paddingBottom:12 } },
          TABS.map(t => h('button', { key:t.id, onClick:()=>setTab(t.id),
            style:{ display:'flex', alignItems:'center', gap:6, padding:'8px 14px', borderRadius:12, fontSize:13, fontWeight:600, border:`1px solid ${tab===t.id?'rgba(59,130,246,0.3)':'transparent'}`, background:tab===t.id?'rgba(59,130,246,0.15)':'none', color:tab===t.id?'#60a5fa':'#525252', cursor:'pointer', fontFamily:'inherit', transition:'all 0.15s' } },
            h('span', null, t.icon), t.label
          ))
        )
      )
    ),

    // Content
    h('main', { style:{ maxWidth:900, margin:'0 auto', padding:'20px 16px 120px' } },
      tab==='school'  && h(SchoolSection),
      tab==='sport'   && h(SportSection),
      tab==='hobbies' && h(HobbiesSection),
      tab==='goals'   && h(GoalsSection),
    ),

    // Mobile bottom nav
    h('nav', { style:{ position:'fixed', bottom:0, left:0, right:0, zIndex:40, background:'rgba(10,10,10,0.95)', backdropFilter:'blur(20px)', borderTop:'1px solid #1c1c1c', display:'flex' } },
      TABS.map(t => h('button', { key:t.id, onClick:()=>setTab(t.id),
        style:{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:4, padding:'12px 0', border:'none', background:'none', color:tab===t.id?'#60a5fa':'#404040', cursor:'pointer', fontFamily:'inherit', transition:'color 0.15s' } },
        h('span', { style:{ fontSize:18 } }, t.icon),
        h('span', { style:{ fontSize:9, fontWeight:700, letterSpacing:'0.06em', textTransform:'uppercase' } }, t.label)
      ))
    )
  );
}

// Mount
createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
