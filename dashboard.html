// ── Sync manager ───────────────────────────────────────────
const _listeners={};
const _syncStatusCbs=new Set();
let _syncStatus='idle';
function setSyncSt(s){_syncStatus=s;_syncStatusCbs.forEach(f=>f(s));}
function notifyKey(key,val){(_listeners[key]||new Set()).forEach(f=>f(val));}
function addListener(key,fn){if(!_listeners[key])_listeners[key]=new Set();_listeners[key].add(fn);return()=>_listeners[key].delete(fn);}
const _pending={};let _syncT=null;
async function flushSync(){
  if(!_sb)return;
  const rows=Object.entries(_pending).map(([key,value])=>({key,value,updated_at:new Date().toISOString()}));
  if(!rows.length)return;
  Object.keys(_pending).forEach(k=>delete _pending[k]);
  setSyncSt('syncing');
  const{error}=await _sb.from('dashboard_data').upsert(rows,{onConflict:'key'});
  setSyncSt(error?'error':'synced');
  setTimeout(()=>setSyncSt('idle'),2000);
}
// 400ms debounce — fast enough that manual refresh (user moves hand to F5)
// always syncs before the page unloads
function scheduleSync(key,val){_pending[key]=val;clearTimeout(_syncT);_syncT=setTimeout(flushSync,400);}

// Smart merge for daysV2: local fields win, cloud fills missing dates/fields
// This means: import on PC → refresh → still there (local wins)
//             import on phone → open PC (cold) → also shows (cloud fills missing dates)
function mergeDays(local,cloud){
  const merged={...cloud};
  Object.keys(local||{}).forEach(date=>{
    if(!merged[date])merged[date]=local[date];
    else merged[date]={...merged[date],...local[date]}; // local fields override per date
  });
  return merged;
}

async function initSync(){
  if(!_sb)return;
  setSyncSt('syncing');
  const{data}=await _sb.from('dashboard_data').select('key,value');
  if(data){
    data.forEach(({key,value})=>{
      if(key==='daysV2'){
        const localRaw=localStorage.getItem('daysV2');
        const local=localRaw?JSON.parse(localRaw):{};
        const merged=mergeDays(local,value||{});
        try{localStorage.setItem('daysV2',JSON.stringify(merged));}catch{}
        notifyKey('daysV2',merged);
      } else {
        // For other keys: cloud wins only if local is empty
        const localRaw=localStorage.getItem(key);
        if(!localRaw||(()=>{try{const v=JSON.parse(localRaw);return!v||Object.keys(v).length===0;}catch{return true;}})()) {
          try{localStorage.setItem(key,JSON.stringify(value));}catch{}
          notifyKey(key,value);
        }
      }
    });
  }
  setSyncSt('synced');setTimeout(()=>setSyncSt('idle'),1500);
  _sb.channel('dash').on('postgres_changes',{event:'*',schema:'public',table:'dashboard_data'},({new:row})=>{
    if(!row?.key)return;
    if(row.key==='daysV2'){
      // Real-time: apply same smart merge so phone changes appear on PC
      const localRaw=localStorage.getItem('daysV2');
      const local=localRaw?JSON.parse(localRaw):{};
      const merged=mergeDays(local,row.value||{});
      try{localStorage.setItem('daysV2',JSON.stringify(merged));}catch{}
      notifyKey('daysV2',merged);
    } else {
      try{localStorage.setItem(row.key,JSON.stringify(row.value));}catch{}
      notifyKey(row.key,row.value);
    }
  }).subscribe();
}
function useSyncStatus(){
  const[s,setS]=useState(_syncStatus);
  useEffect(()=>{_syncStatusCbs.add(setS);return()=>_syncStatusCbs.delete(setS);},[]);
  return s;
}

// ── useLS ──────────────────────────────────────────────────
// Fix 1: useEffect runs after React resolves functional updaters (prev=>{...})
//         so JSON.stringify always gets the real value, not a function.
// Fix 2: fromCloud flag prevents sync-loop: cloud→setVal→useEffect→scheduleSync→cloud→...
function useLS(key,init){
  const[val,setVal]=useState(()=>{
    try{
      const s=localStorage.getItem(key);
      if(s===null||s==='undefined')return init;
      return JSON.parse(s);
    }catch{return init;}
  });
  const mounted=useRef(false);
  const fromCloud=useRef(false);

  // Cloud update: set flag so useEffect knows NOT to sync back
  useEffect(()=>addListener(key,nv=>{fromCloud.current=true;setVal(nv);}),[key]);

  // Save + sync after every state change, but skip:
  //   - first mount (would overwrite cloud with stale local on load)
  //   - cloud-originated updates (prevents sync loop)
  useEffect(()=>{
    if(!mounted.current){mounted.current=true;return;}
    if(val===undefined)return;
    if(fromCloud.current){fromCloud.current=false;return;}
    try{localStorage.setItem(key,JSON.stringify(val));}catch{}
    scheduleSync(key,val);
  },[key,val]);

  return[val,setVal];
}

// ── JSON Import processor ──────────────────────────────────
function processImport(raw,days,setDays){
  let parsed;
  try{parsed=JSON.parse(raw);}catch(e){return{ok:false,msg:'Ongeldige JSON: '+e.message};}
  const items=Array.isArray(parsed)?parsed:[parsed];
  let count=0,errors=[];
  items.forEach(data=>{
    if(!data.type){errors.push('Ontbrekend "type" veld');return;}
    if(!data.date){errors.push('Ontbrekend "date" veld');return;}
    const d=data.date;
    if(data.type==='nutrition'){
      if(!data.meal){errors.push('nutrition: ontbrekend "meal"');return;}
      const existing=days[d]?.nutrition||{goal_kcal:2300,goal_protein:160,goal_carbs:270,goal_fat:70,meals:[]};
      const meals=[...(existing.meals||[]),data.meal];
      setDays(prev=>({...prev,[d]:{...prev[d],nutrition:{...existing,meals}}}));count++;
    }else if(data.type==='training'){
      if(!data.session){errors.push('training: ontbrekend "session"');return;}
      setDays(prev=>({...prev,[d]:{...prev[d],training:data.session}}));count++;
    }else if(data.type==='sleep'){
      if(!data.sleep){errors.push('sleep: ontbrekend "sleep"');return;}
      setDays(prev=>({...prev,[d]:{...prev[d],sleep:data.sleep}}));count++;
    }else if(data.type==='activity'){
      if(!data.activity){errors.push('activity: ontbrekend "activity"');return;}
      setDays(prev=>({...prev,[d]:{...prev[d],activity:data.activity}}));count++;
    }else if(data.type==='full_day'){
      const upd={};
      if(data.nutrition)upd.nutrition=data.nutrition;
      if(data.training)upd.training=data.training;
      if(data.sleep)upd.sleep=data.sleep;
      if(data.activity)upd.activity=data.activity;
      setDays(prev=>({...prev,[d]:{...(prev[d]||{}),...upd}}));count++;
    }else{errors.push('Onbekend type: "'+data.type+'"');}
  });
  if(count===0&&errors.length)return{ok:false,msg:errors[0]};
  return{ok:true,msg:`${count} record(s) geïmporteerd`+(errors.length?` (${errors.length} fout(en) overgeslagen)`:'')} ;
}

// ── PR detection ───────────────────────────────────────────
function getExerciseMaxes(days){
  const mx={};
  Object.values(days).forEach(day=>{
    if(!day?.training?.exercises)return;
    day.training.exercises.forEach(ex=>{
      ex.sets.filter(s=>s.set!=='W').forEach(s=>{
        if(s.weight_kg>0&&(!mx[ex.name]||s.weight_kg>mx[ex.name]))mx[ex.name]=s.weight_kg;
      });
    });
  });
  return mx;
}

function Ring({value,max,size=100,sw=10,color='#3b82f6',children}){
  const r=(size-sw)/2,circ=2*Math.PI*r;
  const p=clamp(value/max,0,1);
  return h('div',{style:{position:'relative',width:size,height:size}},
    h('svg',{width:size,height:size,style:{transform:'rotate(-90deg)',display:'block'}},
      h('circle',{cx:size/2,cy:size/2,r,fill:'none',stroke:'#1e1e1e',strokeWidth:sw}),
      h('circle',{cx:size/2,cy:size/2,r,fill:'none',stroke:color,strokeWidth:sw,strokeDasharray:circ,strokeDashoffset:circ*(1-p),strokeLinecap:'round',style:{transition:'stroke-dashoffset .7s cubic-bezier(.4,0,.2,1)'}})
    ),
    children&&h('div',{style:{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}},children)

// ── Floating Import Button ─────────────────────────────────
function FloatingImport({days,setDays}){
  const[open,setOpen]=useState(false);
  const[raw,setRaw]=useState('');
  const[result,setResult]=useState(null);
  const ta=useRef(null);
  useEffect(()=>{if(open&&ta.current)setTimeout(()=>ta.current?.focus(),100);},[open]);
  function doImport(){
    const r=processImport(raw,days,setDays);
    setResult(r);
    if(r.ok){setRaw('');setTimeout(()=>{setOpen(false);setResult(null);},1200);}
  }
  return h(Fragment,null,
    h('button',{className:'fab',onClick:()=>{setOpen(true);setResult(null);}},
      h('svg',{width:22,height:22,fill:'none',stroke:'currentColor',strokeWidth:2.5,strokeLinecap:'round'},
        h('path',{d:'M12 4v16M4 12l8 8 8-8'})
      )
    ),
    h(Modal,{open,onClose:()=>setOpen(false),title:'JSON Import'},
      h('p',{style:{fontSize:11,color:'#737373',marginBottom:10,marginTop:0}},'Plak je JSON (enkelvoudig of array). Ondersteunde types: nutrition · training · sleep · activity · full_day'),
      h('textarea',{ref:ta,className:'inp',style:{minHeight:180,resize:'vertical',fontFamily:'monospace',fontSize:11},placeholder:'{"type":"nutrition","date":"2026-05-22","meal":{...}}',value:raw,onChange:e=>setRaw(e.target.value)}),
      result&&h('div',{style:{margin:'10px 0',padding:'10px 14px',borderRadius:10,fontSize:12,fontWeight:600,background:result.ok?'rgba(34,197,94,.12)':'rgba(239,68,68,.12)',border:`1px solid ${result.ok?'rgba(34,197,94,.25)':'rgba(239,68,68,.25)'}`,color:result.ok?'#4ade80':'#f87171'}},result.ok?'✓ '+result.msg:'✗ '+result.msg),
      h('div',{style:{display:'flex',gap:8,marginTop:8}},
        h('button',{onClick:()=>{setRaw('');setResult(null);},style:{flex:1,background:'#222',color:'#d4d4d4',border:'none',borderRadius:10,padding:'10px',cursor:'pointer',fontFamily:'inherit',fontSize:13,fontWeight:600}},'Wissen'),
        h('button',{onClick:doImport,disabled:!raw.trim(),style:{flex:2,background:raw.trim()?'#2563eb':'#1a1a1a',color:raw.trim()?'#fff':'#525252',border:'none',borderRadius:10,padding:'10px',cursor:raw.trim()?'pointer':'default',fontFamily:'inherit',fontSize:13,fontWeight:700}},'Importeer')
      )
    )
  );
}

// ══════════════════════════════════════════════════════════
//  TAB 1 — VANDAAG
// ══════════════════════════════════════════════════════════
function VandaagTab({days}){
  const td=today();
  const day=days[td]||{};
  const nut=day.nutrition;
  const tr=day.training;
  const sl=day.sleep;
  const ac=day.activity;
  const tot=nutTotals(nut);
  const goals={kcal:nut?.goal_kcal||2300,protein:nut?.goal_protein||160,carbs:nut?.goal_carbs||270,fat:nut?.goal_fat||70};
  const slColor=sl?.actual_sleep_hours>=7?'#22c55e':sl?.actual_sleep_hours>=6?'#f59e0b':'#ef4444';
  const stepsColor=(ac?.steps||0)>=(ac?.steps_goal||6000)?'#22c55e':'#3b82f6';
  const SESSION_COLORS={'Schouder & Bicep':'#3b82f6','Chest & Tricep':'#ef4444','Buik & Benen':'#22c55e','Rug & Voorarm':'#f59e0b'};
  const trColor=tr?SESSION_COLORS[tr.name]||'#a855f7':'#3b82f6';

  return h('div',{className:'animate-fade'},
    // Greeting banner
    h('div',{style:{background:'linear-gradient(135deg,rgba(37,99,235,.15),rgba(79,70,229,.1))',border:'1px solid rgba(59,130,246,.2)',borderRadius:'1rem',padding:'1rem',marginBottom:'.75rem',display:'flex',alignItems:'center',justifyContent:'space-between'}},
      h('div',null,
        h('p',{style:{fontSize:11,color:'#60a5fa',fontWeight:600,margin:0,textTransform:'uppercase',letterSpacing:'.08em'}},'Vandaag · '+new Date().toLocaleDateString('nl-BE',{weekday:'long',day:'numeric',month:'long'})),
        h('p',{style:{fontSize:20,fontWeight:900,margin:'4px 0 0',letterSpacing:'-.02em'}},'Dag van Jonas 💪')
      ),
      h('div',{style:{textAlign:'right'}},
        h('p',{style:{fontSize:22,fontWeight:900,color:'#60a5fa',margin:0}},tot.protein+'g'),
        h('p',{style:{fontSize:10,color:'#737373',margin:0}},'/'+goals.protein+'g eiwit')
      )
    ),

    // Macro rings
    h('div',{className:'card'},
      h(CardHdr,{title:'Macros vandaag',sub:tot.kcal+' / '+goals.kcal+' kcal'}),
      h('div',{className:'card-p',style:{paddingTop:4}},
        h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-around',padding:'4px 0 12px'}},
          h(MacroRing,{label:'Eiwit',value:tot.protein,max:goals.protein,color:'#22c55e',large:true}),
          h('div',{style:{display:'flex',flexDirection:'column',gap:14}},
            h(MacroRing,{label:'Calorieën',value:tot.kcal,max:goals.kcal,color:'#3b82f6'}),
            h(MacroRing,{label:'Koolhyd.',value:tot.carbs,max:goals.carbs,color:'#f59e0b'}),
            h(MacroRing,{label:'Vetten',value:tot.fat,max:goals.fat,color:'#ec4899'})
          )
        ),
        h('div',{style:{display:'flex',flexDirection:'column',gap:8}},
          [['Eiwit',tot.protein,goals.protein,'#22c55e','g'],['Calorieën',tot.kcal,goals.kcal,'#3b82f6','kcal'],['Koolhyd.',tot.carbs,goals.carbs,'#f59e0b','g'],['Vetten',tot.fat,goals.fat,'#ec4899','g']].map(([lbl,v,mx,clr,unit])=>{
            const p2=pct(v,mx);
            const clr2=p2>=100?'#22c55e':p2>=80?clr:'#ef4444';
            return h('div',{key:lbl},
              h('div',{style:{display:'flex',justifyContent:'space-between',fontSize:11,marginBottom:4}},
                h('span',{style:{color:'#737373'}},lbl),
                h('span',{style:{fontWeight:700,color:clr2}},v+' / '+mx+' '+unit)
              ),
              h(PBar,{value:v,max:mx,color:clr2})
            );
          })
        )
      )
    ),

    // Stats row
    h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:'.75rem'}},
      // Training card
      h('div',{className:'card',style:{margin:0,padding:'12px',borderTop:tr?`2px solid ${trColor}`:'2px solid #222'}},
        h('p',{style:{fontSize:10,color:'#737373',margin:'0 0 4px',textTransform:'uppercase',letterSpacing:'.06em'}},'Training'),
        tr?h('div',null,
          h('p',{style:{fontSize:13,fontWeight:700,color:'#fff',margin:'0 0 2px'}},(tr.name.length>14?tr.name.slice(0,14)+'…':tr.name)),
          h('p',{style:{fontSize:10,color:'#525252',margin:0}},tr.duration_minutes+'min · '+tr.calories_burned+' kcal')
        ):h('p',{style:{fontSize:13,color:'#525252',margin:0}},'Nog niet getraind')
      ),
      // Sleep card
      h('div',{className:'card',style:{margin:0,padding:'12px',borderTop:sl?`2px solid ${slColor}`:'2px solid #222'}},
        h('p',{style:{fontSize:10,color:'#737373',margin:'0 0 4px',textTransform:'uppercase',letterSpacing:'.06em'}},'Slaap'),
        sl?h('div',null,
          h('p',{style:{fontSize:13,fontWeight:700,color:slColor,margin:'0 0 2px'}},sl.actual_sleep_hours+'u'),
          h('p',{style:{fontSize:10,color:'#525252',margin:0}},'Score: '+sl.score+' · '+sl.bedtime+'→'+sl.wake_time)
        ):h('p',{style:{fontSize:13,color:'#525252',margin:0}},'Geen data')
      )
    ),

    // Activity
    ac&&h('div',{className:'card'},
      h(CardHdr,{title:'Activiteit',sub:new Date().toLocaleDateString('nl-BE',{weekday:'short',day:'numeric',month:'short'})}),
      h('div',{className:'card-p',style:{paddingTop:4}},
        h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}},
          h('div',null,
            h('div',{style:{display:'flex',justifyContent:'space-between',fontSize:11,marginBottom:5}},
              h('span',{style:{color:'#737373'}},'Stappen'),
              h('span',{style:{fontWeight:700,color:stepsColor}},(ac.steps||0)+' / '+(ac.steps_goal||6000))
            ),
            h(PBar,{value:ac.steps||0,max:ac.steps_goal||6000,color:stepsColor})
          ),
          h('div',null,
            h('div',{style:{display:'flex',justifyContent:'space-between',fontSize:11,marginBottom:5}},
              h('span',{style:{color:'#737373'}},'Actieve min.'),
              h('span',{style:{fontWeight:700,color:(ac.active_minutes||0)>=(ac.active_minutes_goal||90)?'#22c55e':'#f59e0b'}},(ac.active_minutes||0)+' / '+(ac.active_minutes_goal||90))
            ),
            h(PBar,{value:ac.active_minutes||0,max:ac.active_minutes_goal||90,color:(ac.active_minutes||0)>=(ac.active_minutes_goal||90)?'#22c55e':'#f59e0b'})
          )
        ),
        h('div',{style:{display:'flex',gap:10,marginTop:10,justifyContent:'space-around'}},
          [['Afstand',ac.distance_km+'km','#60a5fa'],['Verbrande kcal',ac.calories_activity+' kcal','#f59e0b'],['Totaal kcal',ac.calories_total+' kcal','#a78bfa']].map(([lbl,val,col])=>
            h('div',{key:lbl,style:{textAlign:'center'}},
              h('p',{style:{fontSize:13,fontWeight:800,color:col,margin:0}},val),
              h('p',{style:{fontSize:10,color:'#525252',margin:0}},lbl)
            )
          )
        )
      )
    )
  );
}

function VoedingTab({days}){
  const[selDate,setSelDate]=useState(today());

  const sortedDates=Object.keys(days).sort().reverse();

  // Week chart data (last 7 days)
  const chartData=last7().map(d=>{

        h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-around',padding:'4px 0 14px'}},
          h(MacroRing,{label:'Eiwit',value:tot.protein,max:goals.protein,color:'#22c55e',large:true}),
          h('div',{style:{display:'flex',flexDirection:'column',gap:14}},
            h(MacroRing,{label:'Calorieën',value:tot.kcal,max:goals.kcal,color:'#3b82f6'}),
            h(MacroRing,{label:'Koolhyd.',value:tot.carbs,max:goals.carbs,color:'#f59e0b'}),
            h(MacroRing,{label:'Vetten',value:tot.fat,max:goals.fat,color:'#ec4899'})
          )

        // Nog te gaan
        h('div',{style:{background:'#1a1a1a',borderRadius:10,padding:'10px 14px'}},
          h('p',{style:{fontSize:10,color:'#525252',margin:'0 0 6px',fontWeight:600,textTransform:'uppercase',letterSpacing:'.06em'}},'Nog te gaan'),

              h('div',{key:lbl,style:{display:'flex',justifyContent:'space-between',fontSize:11}},
                h('span',{style:{color:'#737373'}},lbl),
                h('span',{style:{fontWeight:700,color:col}},val)
              )
            )
          )
        )
      )
    ),

    // Meals list
    nut?.meals?.length>0&&h('div',{className:'card'},
      h(CardHdr,{title:'Maaltijden',sub:(nut.meals.length)+' maaltijden'}),
      h('div',{className:'card-p',style:{paddingTop:4,display:'flex',flexDirection:'column',gap:10}},
        nut.meals.map((meal,mi)=>h('div',{key:mi,style:{borderBottom:mi<nut.meals.length-1?'1px solid #1e1e1e':'none',paddingBottom:mi<nut.meals.length-1?10:0}},
          h('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:6}},

              h('p',{style:{fontSize:12,fontWeight:700,color:'#e5e5e5',margin:0}},meal.name),

            h(Tooltip,{contentStyle:{background:'#1a1a1a',border:'1px solid #262626',borderRadius:8,fontSize:11}}),
            h(ReferenceLine,{y:goals.kcal,stroke:'#3b82f6',strokeDasharray:'4 4',strokeOpacity:.6}),
            h(Line,{type:'monotone',dataKey:'kcal',stroke:'#3b82f6',strokeWidth:2,dot:{r:3,fill:'#3b82f6'},activeDot:{r:4}})

// ══════════════════════════════════════════════════════════
//  TAB 3 — TRAINING
// ══════════════════════════════════════════════════════════
const SESSION_COLORS={'Schouder & Bicep':'#3b82f6','Chest & Tricep':'#ef4444','Buik & Benen':'#22c55e','Rug & Voorarm':'#f59e0b'};

function TrainingCalendar({days,selDate,onSelect}){
  const[refDate,setRefDate]=useState(new Date(selDate+'T00:00:00'));
  const year=refDate.getFullYear(),month=refDate.getMonth();
  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const offset=(firstDay+6)%7; // Mon=0
  const cells=[];
  for(let i=0;i<offset;i++)cells.push(null);
  for(let d=1;d<=daysInMonth;d++)cells.push(d);

  const mnKey=(y,m,d)=>`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  const todayStr=today();
  const weekdays=['Ma','Di','Wo','Do','Vr','Za','Zo'];

  return h('div',{className:'card'},
    h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'1rem 1rem .5rem'}},
      h('button',{onClick:()=>setRefDate(new Date(year,month-1,1)),style:{background:'none',border:'none',color:'#737373',cursor:'pointer',fontSize:18,padding:'2px 6px'}},'‹'),
      h('p',{style:{fontSize:13,fontWeight:700,color:'#e5e5e5',margin:0}},refDate.toLocaleDateString('nl-BE',{month:'long',year:'numeric'})),
      h('button',{onClick:()=>setRefDate(new Date(year,month+1,1)),style:{background:'none',border:'none',color:'#737373',cursor:'pointer',fontSize:18,padding:'2px 6px'}},'›')
    ),
    h('div',{className:'card-p',style:{paddingTop:4}},
      h('div',{style:{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2,marginBottom:4}},
        weekdays.map(w=>h('div',{key:w,style:{fontSize:9,color:'#525252',textAlign:'center',fontWeight:600,padding:'2px 0'}},w))
      ),
      h('div',{style:{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2}},
        cells.map((d,i)=>{
          if(!d)return h('div',{key:'e'+i});
          const dk=mnKey(year,month,d);
          const tr=days[dk]?.training;
          const col=tr?SESSION_COLORS[tr.name]||'#a855f7':null;
          const isToday=dk===todayStr;
          const isSel=dk===selDate;
          return h('div',{key:dk,onClick:()=>onSelect(dk),style:{aspectRatio:'1',borderRadius:6,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',cursor:'pointer',border:isSel?'2px solid #3b82f6':isToday?'1px solid #3b82f620':'1px solid transparent',background:isToday?'rgba(59,130,246,.08)':'transparent',transition:'background .1s'}},
            h('span',{style:{fontSize:11,fontWeight:isToday?800:500,color:isToday?'#60a5fa':'#a3a3a3'}},d),
            col&&h('div',{style:{width:5,height:5,borderRadius:'50%',background:col,marginTop:1}})
          );
        })
      ),
      // Legend
      h('div',{style:{display:'flex',flexWrap:'wrap',gap:8,marginTop:10,justifyContent:'center'}},
        Object.entries(SESSION_COLORS).map(([name,col])=>h('div',{key:name,style:{display:'flex',alignItems:'center',gap:4}},
          h('div',{style:{width:7,height:7,borderRadius:'50%',background:col}}),
          h('span',{style:{fontSize:9,color:'#525252'}},name.split(' & ')[0])
        ))
      )
    )
  );
}

function SessionCard({session,allMaxes,date}){
  const[open,setOpen]=useState(true);
  const col=SESSION_COLORS[session.name]||'#a855f7';

  return h('div',{className:'card',style:{borderTop:`2px solid ${col}`}},
    h('div',{style:{padding:'1rem 1rem .5rem',cursor:'pointer'},onClick:()=>setOpen(!open)},
      h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between'}},
        h('div',null,
          h('p',{style:{fontSize:14,fontWeight:800,color:'#fff',margin:0}},session.name),
          h('p',{style:{fontSize:10,color:'#525252',margin:'2px 0 0'}},fmt(date))
        ),
        h('span',{style:{fontSize:14,color:'#525252'}},open?'▲':'▼')
      ),
      h('div',{style:{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:6,marginTop:10}},
        [['⏱',session.duration_minutes+'m','Duur'],['🏋️',session.volume_kg+'kg','Volume'],['🔥',session.calories_burned+' kcal','Verbrand'],['📊',session.sets_total,'Sets']].map(([ic,val,lbl])=>
          h('div',{key:lbl,style:{background:'#1a1a1a',borderRadius:8,padding:'8px 6px',textAlign:'center'}},
            h('p',{style:{fontSize:13,fontWeight:800,color:'#fff',margin:0}},val),
            h('p',{style:{fontSize:9,color:'#525252',margin:0}},lbl)
          )
        )
      )
    ),
    open&&h('div',{style:{padding:'0 1rem 1rem',display:'flex',flexDirection:'column',gap:8}},
      session.exercises.map((ex,ei)=>{
        const maxW=allMaxes[ex.name]||0;
        return h('div',{key:ei,style:{background:'#1a1a1a',borderRadius:10,overflow:'hidden'}},
          h('div',{style:{padding:'8px 12px',borderBottom:'1px solid #222',display:'flex',alignItems:'center',justifyContent:'space-between'}},
            h('p',{style:{fontSize:12,fontWeight:700,color:'#e5e5e5',margin:0}},ex.name),
            h('span',{style:{fontSize:10,color:'#525252'}},ex.sets.filter(s=>s.set!=='W').length+' sets')
          ),
          h('div',{style:{padding:'8px 12px',display:'flex',flexWrap:'wrap',gap:6}},
            ex.sets.map((s,si)=>{
              const isWarm=s.set==='W'||s.set==='F';
              const isPR=!isWarm&&s.weight_kg>0&&s.weight_kg>=maxW&&maxW>0;
              return h('div',{key:si,style:{display:'flex',alignItems:'center',gap:4,background:isWarm?'#111':'#262626',borderRadius:6,padding:'5px 9px',opacity:isWarm?.65:1}},
                h('span',{style:{fontSize:9,color:'#525252',minWidth:14}},isWarm?'W':s.set),
                h('span',{style:{fontSize:11,fontWeight:700,color:isWarm?'#737373':'#fff'}},s.weight_kg+'kg'),
                h('span',{style:{fontSize:10,color:'#525252'}},'×'),
                h('span',{style:{fontSize:11,fontWeight:700,color:isWarm?'#737373':'#fff'}},s.reps),
                isPR&&h('span',{className:'pr-badge'},'🏆 PR')
              );
            })
          )
        );
      })
    )
  );
}

function TrainingTab({days}){
  const[selDate,setSelDate]=useState(()=>{
    const tr=Object.keys(days).filter(d=>days[d]?.training).sort().reverse();
    return tr[0]||today();
  });
  const allMaxes=getExerciseMaxes(days);
  const session=days[selDate]?.training;

  return h('div',{className:'animate-fade'},
    h(TrainingCalendar,{days,selDate,onSelect:setSelDate}),
    session?h(SessionCard,{session,allMaxes,date:selDate}):

function SlaapTab({days}){
  const daysArr=last7();
  const sleepData=daysArr.map(d=>{
    const sl=days[d]?.sleep;
    const h2=sl?.actual_sleep_hours??null;
    return{name:new Date(d+'T00:00:00').toLocaleDateString('nl-BE',{weekday:'short'}),uren:h2,score:sl?.score??null,date:d};
  });
  const valid=sleepData.filter(s=>s.uren!==null).map(s=>s.uren);
  const avg=valid.length?(valid.reduce((a,b)=>a+b,0)/valid.length).toFixed(1):'-';
  const slColor=h2=>h2===null?'#222':h2<6?'#ef4444':h2<7?'#f59e0b':'#22c55e';

  const actData=daysArr.map(d=>{
    const ac=days[d]?.activity;
    return{name:new Date(d+'T00:00:00').toLocaleDateString('nl-BE',{weekday:'short'}),stappen:ac?.steps??0};
  });

  const td=today();
  const todaySleep=days[td]?.sleep;
  const todayAct=days[td]?.activity;

  return h('div',{className:'animate-fade'},
    // Today sleep hero
    h('div',{className:'card'},
      h(CardHdr,{title:'Slaap',sub:'Doel: 7.5u · Gem 7 dagen: '+avg+'u'}),
      h('div',{className:'card-p',style:{paddingTop:4}},
        todaySleep?h('div',{style:{display:'flex',alignItems:'center',gap:20,marginBottom:16}},
          h(Ring,{value:todaySleep.actual_sleep_hours,max:7.5,size:100,sw:11,color:slColor(todaySleep.actual_sleep_hours)},
            h('span',{style:{fontSize:18,fontWeight:900,color:'#fff',lineHeight:1}},todaySleep.actual_sleep_hours+'u'),
            h('span',{style:{fontSize:10,color:'#737373'}},todaySleep.score+' score')
          ),
          h('div',{style:{flex:1,display:'flex',flexDirection:'column',gap:8}},
            h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}},
              [['🛏 Bedtijd',todaySleep.bedtime],['⏰ Wakker',todaySleep.wake_time],['💤 Diepe slaap',todaySleep.deep_sleep],['🌀 REM',todaySleep.rem_sleep]].map(([lbl,val])=>
                h('div',{key:lbl,style:{background:'#1a1a1a',borderRadius:8,padding:'8px'}},
                  h('p',{style:{fontSize:9,color:'#525252',margin:0}},lbl),
                  h('p',{style:{fontSize:12,fontWeight:700,color:'#fff',margin:'2px 0 0',textTransform:'capitalize'}},val)
                )
              )
            ),
            todaySleep.actual_sleep_hours<6&&h('div',{style:{background:'rgba(239,68,68,.1)',border:'1px solid rgba(239,68,68,.2)',borderRadius:8,padding:'8px 12px'}},
              h('p',{style:{fontSize:11,color:'#f87171',fontWeight:600,margin:0}},'⚠️ Slaaptekort — herstel en spiermassa-behoud lijden hieronder.')
            )
          )
        ):h('p',{style:{color:'#525252',fontSize:13}},'Importeer slaapdata via de import knop.'),

        // Naps
        todaySleep?.naps?.length>0&&h('div',{style:{background:'#1a1a1a',borderRadius:8,padding:'10px 12px',marginBottom:12}},
          h('p',{style:{fontSize:10,color:'#737373',margin:'0 0 6px',fontWeight:600}},'DUTJES ('+todaySleep.naps.length+')'),
          todaySleep.naps.map((nap,ni)=>h('p',{key:ni,style:{fontSize:11,color:'#a3a3a3',margin:'2px 0'}},nap.start+' → '+nap.end))
        ),

        // 7-day chart
        h('div',{style:{height:80,marginBottom:6}},
          h(ResponsiveContainer,{width:'100%',height:'100%'},
            h(BarChart,{data:sleepData,barSize:22,margin:{top:4,right:0,left:0,bottom:0}},
              h(Bar,{dataKey:'uren',radius:[3,3,0,0]},
                sleepData.map((d,i)=>h('rect',{key:i})) // Recharts Cell workaround
              )
            )
          )
        ),
        // Manual bar chart (more reliable coloring)
        h('div',{style:{display:'flex',alignItems:'flex-end',gap:3,height:72,marginBottom:4}},
          sleepData.map((d,i)=>{
            const maxH=Math.max(...sleepData.map(x=>x.uren||0),7.5);
            const barH=d.uren?Math.max((d.uren/maxH)*100,4):4;
            return h('div',{key:i,style:{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'flex-end',height:'100%'}},
              h('div',{style:{width:'100%',height:barH+'%',background:slColor(d.uren),borderRadius:'3px 3px 0 0',transition:'height .5s ease',minHeight:4}})
            );
          })
        ),
        h('div',{style:{display:'flex',justifyContent:'space-around'}},
          sleepData.map((d,i)=>h('div',{key:i,style:{flex:1,textAlign:'center'}},
            h('p',{style:{fontSize:9,color:'#525252',margin:0,textTransform:'capitalize'}},d.name.slice(0,2)),

            h('div',{key:lbl,style:{display:'flex',alignItems:'center',gap:5,fontSize:10,color:'#737373'}},

      h(CardHdr,{title:'Stappen — 7 dagen',sub:'Doel: 6.000/dag'}),
      h('div',{className:'card-p',style:{paddingTop:4}},

          actData.map((d,i)=>{

          actData.map((d,i)=>h('div',{key:i,style:{flex:1,textAlign:'center'}},
            h('p',{style:{fontSize:9,color:'#525252',margin:0}},d.name.slice(0,2)),
            h('p',{style:{fontSize:9,fontWeight:700,color:(d.stappen||0)>=6000?'#22c55e':'#737373',margin:0}},d.stappen||'–')
          ))
        ),
        todayAct&&h('div',{style:{marginTop:12,display:'flex',gap:8}},
          [['Stappen',todayAct.steps,todayAct.steps_goal],['Actieve min.',todayAct.active_minutes,todayAct.active_minutes_goal]].map(([lbl,v,mx])=>h('div',{key:lbl,style:{flex:1,background:'#1a1a1a',borderRadius:10,padding:'10px'}},

            h(PBar,{value:v||0,max:mx,color:v>=mx?'#22c55e':'#3b82f6'})
          ))

      )
    )
  );
}

function calcStreak(hid,habitsHist){
  let streak=0;const now=new Date();
  for(let i=0;i<365;i++){const d=new Date(now);d.setDate(d.getDate()-i);const k=d.toISOString().split('T')[0];if(habitsHist[k]?.[hid])streak++;else break;}
  return streak;
}

          h('span',{style:{fontSize:11,fontWeight:700,color:doneCount===HABITS.length?'#4ade80':'#737373'}},Math.round(doneCount/HABITS.length*100)+'%'+(doneCount===HABITS.length?' 🔥':''))

            const streak=calcStreak(hab.id,habits);
            return h('button',{key:hab.id,onClick:()=>toggle(hab.id),style:{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',borderRadius:12,border:`1px solid ${checked?'rgba(34,197,94,.2)':'#1e1e1e'}`,background:checked?'rgba(34,197,94,.05)':'#1a1a1a',cursor:'pointer',width:'100%',fontFamily:'inherit',transition:'all .15s'}},
              h('div',{style:{width:22,height:22,borderRadius:'50%',border:`2px solid ${checked?'#22c55e':'#333'}`,background:checked?'#22c55e':'none',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,transition:'all .15s',boxShadow:checked?'0 0 8px rgba(34,197,94,.4)':'none'}},
                checked&&h('span',{style:{color:'#fff',fontSize:8,fontWeight:900}},'✓')
              ),
              h('span',{style:{fontSize:16,lineHeight:1}},hab.icon),
              h('span',{style:{flex:1,fontSize:12,color:checked?'#d4d4d4':'#737373',textAlign:'left'}},hab.lbl),
              streak>0&&h('span',{style:{fontSize:11,fontWeight:700,color:checked?'#fb923c':'#525252',display:'flex',alignItems:'center',gap:3}},'🔥',streak)
            );
          })
        )
      )
    ),

    // Weight tracker
    h('div',{className:'card'},
      h(CardHdr,{title:'Gewicht',sub:'76kg → 70kg (zomer)',action:h(BlueBtn,{onClick:()=>setWModal(true)},'+ Log')}),
      h('div',{className:'card-p',style:{paddingTop:4}},
        h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:12}},
          [['Huidig',curW+'kg','#3b82f6'],['Verloren','-'+lost.toFixed(1)+'kg','#22c55e'],['Nog',toGo.toFixed(1)+'kg','#f59e0b']].map(([lbl,val,col])=>
            h('div',{key:lbl,style:{background:'#1a1a1a',borderRadius:10,padding:'10px',textAlign:'center'}},
              h('p',{style:{fontSize:10,color:'#525252',margin:'0 0 3px'}},lbl),
              h('p',{style:{fontSize:16,fontWeight:900,color:col,margin:0}},val)
            )
          )
        ),
        h('div',{style:{display:'flex',justifyContent:'space-between',fontSize:10,color:'#525252',marginBottom:5}},
          '76kg',h('span',{style:{color:'#60a5fa',fontWeight:700}},wPct+'% bereikt'),'70kg'
        ),
        h('div',{style:{height:12,background:'#1e1e1e',borderRadius:999,overflow:'hidden',marginBottom:10}},
          h('div',{style:{height:'100%',background:'linear-gradient(90deg,#3b82f6,#22c55e)',borderRadius:999,width:wPct+'%',transition:'width 1s ease'}})
        ),
        sortedW.length>1&&h('div',{style:{height:80}},
          h(ResponsiveContainer,{width:'100%',height:'100%'},
            h(LineChart,{data:sortedW.slice(-8).map(e=>({d:fmt(e.date),w:e.weight})),margin:{top:4,right:8,left:-20,bottom:0}},
              h(XAxis,{dataKey:'d',tick:{fontSize:8,fill:'#525252'}}),
              h(YAxis,{domain:['dataMin - 1','dataMax + 1'],tick:{fontSize:8,fill:'#525252'}}),
              h(Tooltip,{contentStyle:{background:'#1a1a1a',border:'1px solid #262626',borderRadius:8,fontSize:11},formatter:v=>[v+'kg','']}),
              h(Line,{type:'monotone',dataKey:'w',stroke:'#3b82f6',strokeWidth:2,dot:{r:3},activeDot:{r:4}})
            )
          )
        )
      )
    ),
    h(Modal,{open:wModal,onClose:()=>setWModal(false),title:'Gewicht loggen'},
      h(MField,{label:'Gewicht (kg)'},h('input',{type:'number',step:'0.1',className:'inp',placeholder:'75.4',value:wForm,onChange:e=>setWForm(e.target.value),onKeyDown:e=>{if(e.key==='Enter'){const w=parseFloat(wForm);if(!w)return;setWeightLog(prev=>[...prev,{id:uid(),date:td,weight:w}]);setWForm('');setWModal(false);}}})),
      h('button',{className:'btn-blue',onClick:()=>{const w=parseFloat(wForm);if(!w)return;setWeightLog(prev=>[...prev,{id:uid(),date:td,weight:w}]);setWForm('');setWModal(false);}},'Opslaan')
    ),

    // Tinkering
    h('div',{className:'card'},
      h(CardHdr,{title:'Tinkering / DIY',sub:'Hardware & elektronica builds'}),
      h('div',{className:'card-p',style:{paddingTop:4,display:'flex',flexDirection:'column',gap:8}},
        tink.map(p=>{
          const sc=STCOLS[p.status];
          return h('div',{key:p.id,style:{background:'#1a1a1a',borderRadius:12,padding:'12px',border:`1px solid ${sc.bd}`}},
            h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8}},
              h('div',{style:{flex:1}},
                h('p',{style:{fontSize:13,fontWeight:700,color:'#e5e5e5',margin:0}},p.title),
                h('p',{style:{fontSize:11,color:'#737373',margin:'4px 0 6px',lineHeight:1.4}},p.desc),
                h('div',{style:{display:'flex',flexWrap:'wrap',gap:4}},
                  p.tags.map(tg=>h('span',{key:tg,style:{fontSize:9,background:'#111',color:'#737373',padding:'2px 7px',borderRadius:999}},tg))
                )
              ),
              h('button',{onClick:()=>cycleStatus(p.id),style:{fontSize:9,fontWeight:700,padding:'4px 10px',borderRadius:8,border:'none',cursor:'pointer',flexShrink:0,background:sc.bg,color:sc.tx}},p.status)
            )
          );
        })
      )
    ),

    // Streak summary
    h('div',{className:'card'},
      h(CardHdr,{title:'Streaks',sub:'Aaneengesloten dagen'}),
      h('div',{className:'card-p',style:{paddingTop:4,display:'flex',flexDirection:'column',gap:10}},
        HABITS.map(hab=>{
          const str=calcStreak(hab.id,habits);
          return h('div',{key:hab.id,style:{display:'flex',alignItems:'center',gap:8}},
            h('span',{style:{fontSize:14,width:22,textAlign:'center'}},hab.icon),
            h('div',{style:{flex:1}},
              h('div',{style:{display:'flex',justifyContent:'space-between',fontSize:10,marginBottom:3}},
                h('span',{style:{color:'#737373',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:'75%'}},hab.lbl),
                h('span',{style:{fontWeight:700,color:str>0?'#fb923c':'#525252'}},str>0?'🔥 '+str+'d':'0d')
              ),
              h(PBar,{value:Math.min(str,30),max:30,color:str>=7?'#f59e0b':'#3b82f6'})
            )
          );
        })
      )
    )
  );
}

// ══════════════════════════════════════════════════════════
//  APP ROOT
// ══════════════════════════════════════════════════════════
const TABS=[
  {id:'vandaag', lbl:'Vandaag', icon:'📊'},
  {id:'voeding', lbl:'Voeding', icon:'🥗'},
  {id:'training',lbl:'Training',icon:'💪'},
  {id:'slaap',   lbl:'Slaap',   icon:'😴'},
  {id:'school',  lbl:'School',  icon:'🎓'},
  {id:'goals',   lbl:'Goals',   icon:'🎯'},
];

function App(){
  const[tab,setTab]=useState('vandaag');
  const[days,setDays]=useLS('daysV2',SEED);
  const syncSt=useSyncStatus();
  useEffect(()=>{initSync();},[]);

  const now=new Date(),hr=now.getHours();
  const greeting=hr<12?'Goedemorgen':hr<18?'Goedenmiddag':'Goedenavond';
  const dateLbl=now.toLocaleDateString('nl-BE',{weekday:'long',day:'numeric',month:'long'});

  const syncDot=h('div',{title:{syncing:'Synchroniseren…',synced:'Gesynchroniseerd',error:'Sync fout'}[syncSt]||'Sync actief',style:{width:7,height:7,borderRadius:'50%',flexShrink:0,background:{syncing:'#f59e0b',error:'#ef4444',synced:'#22c55e'}[syncSt]||'#3b82f6',boxShadow:syncSt==='synced'?'0 0 6px rgba(34,197,94,.5)':syncSt==='syncing'?'0 0 6px rgba(245,158,11,.5)':'none',animation:syncSt==='syncing'?'pulse 1s infinite':'none'}});

  return h('div',{style:{minHeight:'100vh',background:'#0a0a0a',color:'#fff',fontFamily:'Inter,system-ui,sans-serif'}},
    // Header
    h('header',{style:{position:'sticky',top:0,zIndex:40,background:'rgba(10,10,10,.92)',backdropFilter:'blur(20px)',borderBottom:'1px solid #1c1c1c'}},
      h('div',{style:{maxWidth:900,margin:'0 auto',padding:'0 16px'}},
        h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'11px 0'}},
          h('div',null,
            h('p',{style:{fontSize:10,color:'#525252',textTransform:'capitalize',letterSpacing:'.04em',margin:0}},dateLbl),
            h('h1',{style:{fontSize:17,fontWeight:900,letterSpacing:'-.02em',margin:'2px 0 0'}},
              greeting+', ',
              h('span',{style:{background:'linear-gradient(90deg,#60a5fa,#93c5fd)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}},'Jonas'),
              ' 👊'
            )
          ),
          h('div',{style:{display:'flex',alignItems:'center',gap:10}},
            syncDot,
            h('div',{style:{width:34,height:34,borderRadius:'50%',background:'linear-gradient(135deg,#2563eb,#4f46e5)',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800,fontSize:13}},'J')
          )
        ),
        // Desktop tab bar
        h('div',{style:{display:'flex',gap:2,paddingBottom:10,overflowX:'auto'}},
          TABS.map(t=>h('button',{key:t.id,onClick:()=>setTab(t.id),style:{display:'flex',alignItems:'center',gap:5,padding:'6px 12px',borderRadius:10,fontSize:12,fontWeight:600,border:`1px solid ${tab===t.id?'rgba(59,130,246,.3)':'transparent'}`,background:tab===t.id?'rgba(59,130,246,.15)':'none',color:tab===t.id?'#60a5fa':'#525252',cursor:'pointer',fontFamily:'inherit',flexShrink:0,transition:'all .15s'}},t.icon,' ',t.lbl))
        )
      )
    ),

    // Content
    h('main',{style:{maxWidth:900,margin:'0 auto',padding:'16px 16px 120px'}},
      tab==='vandaag' &&h(VandaagTab,{days}),
      tab==='voeding' &&h(VoedingTab,{days}),
      tab==='training'&&h(TrainingTab,{days}),
      tab==='slaap'   &&h(SlaapTab,{days}),
      tab==='school'  &&h(SchoolTab),
      tab==='goals'   &&h(GoalsTab)
    ),

    // Floating import
    h(FloatingImport,{days,setDays}),

    // Mobile bottom nav
    h('nav',{style:{position:'fixed',bottom:0,left:0,right:0,zIndex:40,background:'rgba(10,10,10,.96)',backdropFilter:'blur(20px)',borderTop:'1px solid #1c1c1c'}},
      h('div',{style:{display:'flex',maxWidth:900,margin:'0 auto'}},
        TABS.map(t=>h('button',{key:t.id,onClick:()=>setTab(t.id),style:{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:2,padding:'10px 2px',border:'none',background:'none',color:tab===t.id?'#60a5fa':'#404040',cursor:'pointer',fontFamily:'inherit',transition:'color .15s'}},
          h('span',{style:{fontSize:16}},t.icon),
          h('span',{style:{fontSize:'8px',fontWeight:700,letterSpacing:'.04em',textTransform:'uppercase',whiteSpace:'nowrap'}},t.lbl)
        ))
      )
    )
  );
}

createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
