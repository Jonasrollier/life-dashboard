<body>
<div id="root"></div>
<script type="module">
import{createElement as h,useState,useEffect,useCallback,useRef,Fragment}from'https://esm.sh/react@18';
import{createRoot}from'https://esm.sh/react-dom@18/client';
import{LineChart,Line,BarChart,Bar,XAxis,YAxis,Tooltip,ResponsiveContainer,CartesianGrid,ReferenceLine,Legend}from'https://esm.sh/recharts@2.10.0';

// ── Supabase ──────────────────────────────────────────────
const SB_URL='https://amfnhqcazcmctmuhjkcr.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFtZm5ocWNhemNtY3RtdWhqa2NyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0NTc5MjQsImV4cCI6MjA5NTAzMzkyNH0.mOxbsshZ1slA47_Bw_U2dEQ3iDswYp4LCPuh4x7sb7s';
const _sb=window.supabase?.createClient(SB_URL,SB_KEY);

// ── Sync ──────────────────────────────────────────────────
const _listeners={},_stCbs=new Set();
let _st='idle';
function setSt(s){_st=s;_stCbs.forEach(f=>f(s));}
function notifyKey(k,v){(_listeners[k]||new Set()).forEach(f=>f(v));}
function addListen(k,fn){if(!_listeners[k])_listeners[k]=new Set();_listeners[k].add(fn);return()=>_listeners[k].delete(fn);}
const _pend={};let _syncT=null;
async function flushSync(){
  if(!_sb)return;
  const rows=Object.entries(_pend).map(([k,v])=>({key:k,value:v,updated_at:new Date().toISOString()}));
  if(!rows.length)return;
  Object.keys(_pend).forEach(k=>delete _pend[k]);
  setSt('syncing');
  const{error}=await _sb.from('dashboard_data').upsert(rows,{onConflict:'key'});
  setSt(error?'error':'synced');
  setTimeout(()=>setSt('idle'),1800);
}
function schedSync(k,v){_pend[k]=v;clearTimeout(_syncT);_syncT=setTimeout(flushSync,400);}
function mergeDays(local,cloud){
  const m={...local};
  Object.keys(cloud||{}).forEach(d=>{if(!m[d])m[d]=cloud[d];else m[d]={...m[d],...cloud[d]};});
  return m;
}
async function initSync(){
  if(!_sb)return;
  try{
    const{data}=await _sb.from('dashboard_data').select('key,value');
    if(data)data.forEach(({key,value})=>{
      if(key==='daysV2'){
        const lr=localStorage.getItem('daysV2');
        const local=(lr&&lr!=='undefined')?JSON.parse(lr):{};
        const merged=mergeDays(local,value||{});
        try{localStorage.setItem('daysV2',JSON.stringify(merged));}catch{}
        notifyKey('daysV2',merged);
      }else{
        try{localStorage.setItem(key,JSON.stringify(value));}catch{}
        notifyKey(key,value);
      }
    });
    setSt('synced');setTimeout(()=>setSt('idle'),1000);
  }catch{setSt('idle');}
  _sb.channel('dash3').on('postgres_changes',{event:'*',schema:'public',table:'dashboard_data'},({new:row})=>{
    if(!row?.key)return;
    if(row.key==='daysV2'){
      const lr=localStorage.getItem('daysV2');
      const local=(lr&&lr!=='undefined')?JSON.parse(lr):{};
      const merged=mergeDays(local,row.value||{});
      try{localStorage.setItem('daysV2',JSON.stringify(merged));}catch{}
      notifyKey('daysV2',merged);
    }else{try{localStorage.setItem(row.key,JSON.stringify(row.value));}catch{}notifyKey(row.key,row.value);}
  }).subscribe();
}
function useSyncSt(){const[s,setS]=useState(_st);useEffect(()=>{_stCbs.add(setS);return()=>_stCbs.delete(setS);},[]);return s;}

// ── useLS ─────────────────────────────────────────────────
function useLS(key,init){
  const[val,setVal]=useState(()=>{try{const s=localStorage.getItem(key);if(s===null||s==='undefined')return init;return JSON.parse(s);}catch{return init;}});
  const mt=useRef(false),fc=useRef(false);
  useEffect(()=>addListen(key,nv=>{fc.current=true;setVal(nv);}),[key]);
  useEffect(()=>{
    if(!mt.current){mt.current=true;return;}
    if(val===undefined)return;
    if(fc.current){fc.current=false;return;}
    try{localStorage.setItem(key,JSON.stringify(val));}catch{}
    schedSync(key,val);
  },[key,val]);
  return[val,setVal];
}

// ── Helpers ───────────────────────────────────────────────
const today=()=>new Date().toISOString().split('T')[0];
const uid=()=>Math.random().toString(36).slice(2,9);
const fmtD=(s)=>new Date(s+'T00:00:00').toLocaleDateString('nl-BE',{day:'numeric',month:'short'});
const ddiff=(s)=>{const t=new Date(s+'T00:00:00'),n=new Date();n.setHours(0,0,0,0);return Math.round((t-n)/86400000);};
const pct=(v,m)=>Math.min(Math.round(v/m*100),100);
const rawPct=(v,m)=>m>0?Math.round(v/m*100):0;
const clamp=(v,a,b)=>Math.min(Math.max(v,a),b);
const last7=()=>Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(6-i));return d.toISOString().split('T')[0];});
const nutTot=(nut)=>(nut?.meals||[]).reduce((a,m)=>({kcal:a.kcal+(m.totals?.kcal||0),protein:a.protein+(m.totals?.protein||0),carbs:a.carbs+(m.totals?.carbs||0),fat:a.fat+(m.totals?.fat||0)}),{kcal:0,protein:0,carbs:0,fat:0});
// Round macro grams: 1 decimal, trim trailing .0
const fmtG=v=>{const r=Math.round(v*10)/10;return Number.isInteger(r)?String(r):r.toFixed(1);};
const mealLbl={pre_workout:'Pre-workout',breakfast:'Ontbijt',lunch:'Lunch',drinks:'Drank',dinner:'Avondeten',snack:'Snack',late_night:'Late night'};
const SESSION_COLS={'Schouder & Bicep':'#3b82f6','Chest & Tricep':'#ef4444','Buik & Benen':'#22c55e','Rug & Voorarm':'#f59e0b'};
const FACTOR_ST={uitstekend:{c:'#3b82f6',i:'⭐'},goed:{c:'#22c55e',i:'✓'},redelijk:{c:'#f59e0b',i:'~'},aandacht:{c:'#f59e0b',i:'⚠'},kritiek:{c:'#ef4444',i:'✗'}};

// ── PR detection ──────────────────────────────────────────
function getPR(exName,set,sessionDate,allDays){
  if(set.set==='W'||set.set==='F')return null;
  if(set.weight_kg<=0)return null;
  let maxW=0,maxRepsAtW=0;
  Object.entries(allDays).filter(([d])=>d<sessionDate).forEach(([,day])=>{
    (day?.training?.exercises||[]).filter(e=>e.name===exName).forEach(ex=>{
      ex.sets.filter(s=>s.set!=='W'&&s.set!=='F').forEach(s=>{
        if(s.weight_kg>maxW)maxW=s.weight_kg;
        if(s.weight_kg===set.weight_kg&&s.reps>maxRepsAtW)maxRepsAtW=s.reps;
      });
    });
  });
  if(set.weight_kg>maxW&&maxW>0)return'gold';
  if(set.weight_kg===maxW&&maxW>0&&set.reps>maxRepsAtW&&maxRepsAtW>0)return'silver';
  return null;
}
function getExMaxes(days){
  const mx={};
  Object.values(days).forEach(day=>{
    (day?.training?.exercises||[]).forEach(ex=>{
      ex.sets.filter(s=>s.set!=='W'&&s.set!=='F').forEach(s=>{
        if(s.weight_kg>0&&(!mx[ex.name]||s.weight_kg>mx[ex.name]))mx[ex.name]=s.weight_kg;
      });
    });
  });
  return mx;
}

// ── Training stats ────────────────────────────────────────
function getTrainingStreak(days){
  let streak=0;
  const now=new Date();
  for(let w=0;w<52;w++){
    let cnt=0;
    for(let d=0;d<7;d++){
      const dt=new Date(now);dt.setDate(dt.getDate()-(w*7+d));
      if(days[dt.toISOString().split('T')[0]]?.training)cnt++;
    }
    if(cnt>=4)streak++;
    else if(streak>0)break;
  }
  return streak;
}
function getWeekDates(offset=0){
  const now=new Date();
  const dow=(now.getDay()+6)%7;
  return Array.from({length:7},(_,i)=>{
    const d=new Date(now);d.setDate(d.getDate()-dow-offset*7+i);return d.toISOString().split('T')[0];
  });
}
const slCol5=v=>v>=8?'#16a34a':v>=7?'#22c55e':v>=6?'#4ade80':v>=5.5?'#eab308':v>=5?'#f59e0b':'#ef4444';
function weekVolByMuscle(days,offset=0){
  const wk=getWeekDates(offset);
  const vol={};
  wk.forEach(d=>{
    const tr=days[d]?.training;
    if(!tr)return;
    const col=SESSION_COLS[tr.name]||'#a855f7';
    if(!vol[tr.name])vol[tr.name]=0;
    vol[tr.name]+=(tr.volume_kg||0);
  });
  return vol;
}
function getTop5Progress(days){
  const byEx={};
  Object.entries(days).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([date,day])=>{
    (day?.training?.exercises||[]).forEach(ex=>{
      const ws=ex.sets.filter(s=>s.set!=='W'&&s.set!=='F');
      if(!ws.length)return;
      const mw=Math.max(...ws.map(s=>s.weight_kg));
      if(!byEx[ex.name])byEx[ex.name]={first:null,last:null};
      if(!byEx[ex.name].first&&mw>0)byEx[ex.name].first=mw;
      if(mw>0)byEx[ex.name].last=mw;
    });
  });
  return Object.entries(byEx)
    .filter(([,v])=>v.first>0&&v.last>0&&v.last!==v.first)
    .map(([name,v])=>({name,pct:+((v.last-v.first)/v.first*100).toFixed(1),from:v.first,to:v.last}))
    .sort((a,b)=>b.pct-a.pct).slice(0,5);
}
function getExHistory(exName,days){
  return Object.entries(days).sort((a,b)=>a[0].localeCompare(b[0]))
    .filter(([,d])=>d?.training?.exercises?.some(e=>e.name===exName))
    .map(([date,d])=>{
      const ex=d.training.exercises.find(e=>e.name===exName);
      const ws=ex.sets.filter(s=>s.set!=='W'&&s.set!=='F');
      const mw=ws.length?Math.max(...ws.map(s=>s.weight_kg)):0;
      const mv=ws.reduce((a,s)=>a+s.weight_kg*s.reps,0);
      return{date:fmtD(date),maxW:mw,vol:mv};
    });
}

// ── processImport ─────────────────────────────────────────
function processImport(raw,days,setDays){
  let parsed;
  try{parsed=JSON.parse(raw);}catch(e){return{ok:false,msg:'Ongeldige JSON: '+e.message};}
  const items=Array.isArray(parsed)?parsed:[parsed];
  let cnt=0,errs=[];
  items.forEach(data=>{
    if(!data.type){errs.push('Ontbrekend "type"');return;}
    if(!data.date){errs.push('Ontbrekend "date"');return;}
    const d=data.date;
    if(data.type==='nutrition'){
      if(!data.meal){errs.push('nutrition: geen "meal"');return;}
      const ex=days[d]?.nutrition||{goal_kcal:2300,goal_protein:160,goal_carbs:270,goal_fat:70,meals:[]};
      setDays(prev=>({...prev,[d]:{...prev[d],nutrition:{...ex,meals:[...(ex.meals||[]),data.meal]}}}));cnt++;
    }else if(data.type==='training'){
      if(!data.session){errs.push('training: geen "session"');return;}
      setDays(prev=>({...prev,[d]:{...prev[d],training:data.session}}));cnt++;
    }else if(data.type==='samsung_health_full'){
      const sh={};
      if(data.sleep)sh.sleep=data.sleep;
      if(data.energy_score)sh.energy_score=data.energy_score;
      if(data.activity)sh.activity=data.activity;
      setDays(prev=>({...prev,[d]:{...prev[d],samsung_health:sh}}));cnt++;
    }else if(data.type==='sleep_detailed'){
      const sh=days[d]?.samsung_health||{};
      setDays(prev=>({...prev,[d]:{...prev[d],samsung_health:{...sh,sleep:data.sleep}}}));cnt++;
    }else if(data.type==='activity'){
      const sh=days[d]?.samsung_health||{};
      setDays(prev=>({...prev,[d]:{...prev[d],samsung_health:{...sh,activity:data.activity}}}));cnt++;
    }else if(data.type==='full_day'){
      const upd={};
      if(data.nutrition)upd.nutrition=data.nutrition;
      if(data.training)upd.training=data.training;
      if(data.samsung_health)upd.samsung_health=data.samsung_health;
      setDays(prev=>({...prev,[d]:{...(prev[d]||{}),...upd}}));cnt++;
    }else if(data.type==='daily_planning'){
      if(!Array.isArray(data.planning)){errs.push('daily_planning: "planning" moet een array zijn');return;}
      setDays(prev=>({...prev,[d]:{...(prev[d]||{}),planning:data.planning}}));cnt++;
    }else{errs.push('Onbekend type: '+data.type);}
  });
  if(!cnt&&errs.length)return{ok:false,msg:errs[0]};
  return{ok:true,msg:`${cnt} record(s) geïmporteerd`+(errs.length?` (${errs.length} fout(en))`:'')} ;
}

// ── Shared UI ─────────────────────────────────────────────
function Ring({value,max,size=100,sw=10,color='#3b82f6',children}){
  const r=(size-sw)/2,circ=2*Math.PI*r,p=clamp(value/max,0,1);
  return h('div',{style:{position:'relative',width:size,height:size}},
    h('svg',{width:size,height:size,style:{transform:'rotate(-90deg)',display:'block'}},
      h('circle',{cx:size/2,cy:size/2,r,fill:'none',stroke:'#1e1e1e',strokeWidth:sw}),
      h('circle',{cx:size/2,cy:size/2,r,fill:'none',stroke:color,strokeWidth:sw,strokeDasharray:circ,strokeDashoffset:circ*(1-p),strokeLinecap:'round',style:{transition:'stroke-dashoffset .7s cubic-bezier(.4,0,.2,1)'}})
    ),
    children&&h('div',{style:{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}},children)
  );
}
function PBar({value,max,color='#3b82f6'}){return h('div',{className:'pbar'},h('div',{className:'pfill',style:{width:pct(value,max)+'%',backgroundColor:color}}));}
function CardHdr({title,sub,action}){
  return h('div',{style:{display:'flex',alignItems:'flex-start',justifyContent:'space-between',padding:'1rem 1rem .4rem'}},
    h('div',null,
      h('h2',{style:{fontSize:11,fontWeight:700,color:'#d4d4d4',letterSpacing:'.08em',textTransform:'uppercase',margin:0}},title),
      sub&&h('p',{style:{fontSize:10,color:'#525252',margin:0,marginTop:1}},sub)
    ),
    action&&h('div',{style:{flexShrink:0,marginLeft:8}},action)
  );
}
function SmBtn({onClick,children}){return h('button',{onClick,style:{display:'flex',alignItems:'center',gap:4,background:'#1e1e1e',color:'#d4d4d4',fontSize:11,fontWeight:500,padding:'5px 10px',borderRadius:8,border:'none',cursor:'pointer',fontFamily:'inherit'}},children);}
function BlueBtn({onClick,children,full}){return h('button',{onClick,style:{display:'flex',alignItems:'center',gap:4,background:'#2563eb',color:'#fff',fontSize:11,fontWeight:700,padding:'6px 12px',borderRadius:8,border:'none',cursor:'pointer',fontFamily:'inherit',width:full?'100%':undefined,justifyContent:full?'center':undefined}},children);}
function Modal({open,onClose,title,children}){
  useEffect(()=>{if(!open)return;const fn=e=>{if(e.key==='Escape')onClose();};window.addEventListener('keydown',fn);return()=>window.removeEventListener('keydown',fn);},[open,onClose]);
  if(!open)return null;
  return h('div',{className:'modal-bg anim-fade',onClick:e=>{if(e.target===e.currentTarget)onClose();}},
    h('div',{className:'modal-box anim-up'},
      h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'1rem 1.25rem',borderBottom:'1px solid #222'}},
        h('h3',{style:{fontSize:13,fontWeight:700,color:'#fff',margin:0}},title),
        h('button',{onClick:onClose,style:{width:26,height:26,borderRadius:'50%',background:'#222',border:'none',color:'#a3a3a3',cursor:'pointer',fontSize:16,display:'flex',alignItems:'center',justifyContent:'center'}},'×')
      ),
      h('div',{className:'modal-body'},children)
    )
  );
}
function MField({label,children}){return h('div',{style:{marginBottom:'1rem'}},h('label',{style:{display:'block',fontSize:11,fontWeight:500,color:'#737373',marginBottom:5}},label),children);}
function FactorBadge({label,value}){
  const s=FACTOR_ST[value?.toLowerCase()]||FACTOR_ST.aandacht;
  return h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'5px 10px',background:`${s.c}15`,borderRadius:8,border:`1px solid ${s.c}30`}},
    h('span',{style:{fontSize:11,color:'#d4d4d4'}}),label,
    h('span',{style:{fontSize:10,fontWeight:700,color:s.c}},s.i+' '+value)
  );
}
// typeB=true → MAX LIMIET (kcal/carbs/fat): green≤100%, red>100%
// typeB=false → MIN DOEL (protein/water): blue<100%, green≥100%
function MacroRing({label,value,max,large,typeB}){
  const size=large?150:82,sw=large?13:8;
  const isKcal=label==='Calorieën';
  const rp=rawPct(value,max);
  const over=rp>100;
  const rc=typeB?(over?'#ef4444':'#22c55e'):(over||rp>=100?'#22c55e':'#3b82f6');
  const unit=isKcal?' kcal':'g';
  const dispVal=isKcal?Math.round(value):fmtG(value);
  const dispMax=isKcal?Math.round(max):fmtG(max);
  const pctLabel=rp+'%';
  const subCol=over?(typeB?'#f87171':'#4ade80'):'#525252';
  return h('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',gap:6}},
    h(Ring,{value:Math.min(value,max),max,size,sw,color:rc},
      h('span',{style:{fontWeight:900,fontSize:large?20:12,color:over?(typeB?'#f87171':'#4ade80'):'#fff',lineHeight:1}},pctLabel),
      large&&h('span',{style:{fontSize:11,color:'#737373',marginTop:2}},dispVal+unit)
    ),
    h('div',{style:{textAlign:'center',lineHeight:1.35}},
      h('p',{style:{fontWeight:700,fontSize:large?13:11,color:large?'#fff':'#d4d4d4',margin:0}},label),
      h('p',{style:{fontSize:10,color:subCol,margin:0,fontWeight:over?600:400}},dispVal+' / '+dispMax+unit+(over?(typeB?' ⚠':' ✓'):''))
    )
  );
}

function NettoKcal({tot,sh,goals}){
  const burned=sh?.activity?.calories_total||0;
  const currentHour=new Date().getHours()+new Date().getMinutes()/60;
  const bmrBurned=Math.round((2000/24)*currentHour);
  const totalBurned=burned+bmrBurned;
  const netto=tot.kcal-totalBurned;
  const goalKcal=goals?.kcal||2300;
  // Netto deficit analysis color (for the netto grid value)
  const netCol=netto>=-500&&netto<=-300?'#22c55e':netto<=0?'#f59e0b':'#ef4444';
  // Intake vs goal: the cut status is purely whether intake exceeds the goal budget
  const intakeOver=Math.round(tot.kcal)>goalKcal;
  const statusCol=intakeOver?'#ef4444':'#22c55e';
  const statusMsg=intakeOver
    ?'✗ Calorie-limiet overschreden (+'+Math.round(tot.kcal-goalKcal)+' kcal)'
    :'✓ Caloriedoel behaald (Cut veilig)';
  return h('div',{className:'card'},
    h(CardHdr,{title:'Netto Calorieën',sub:'Ingenomen − totaal verbrand (Actief + Rust tot nu)'}),
    h('div',{className:'card-p',style:{paddingTop:4}},
      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,marginBottom:10}},
        [['Ingenomen',Math.round(tot.kcal)+' kcal','#3b82f6'],['Verbrand',totalBurned+' kcal','#f59e0b'],['Netto',(netto>0?'+':'')+Math.round(netto)+' kcal',netCol]].map(([l,v,c])=>
          h('div',{key:l,style:{background:'#1a1a1a',borderRadius:10,padding:'10px',textAlign:'center'}},
            h('p',{style:{fontSize:10,color:'#525252',margin:'0 0 3px'}},l),
            h('p',{style:{fontSize:14,fontWeight:900,color:c,margin:0}},v)
          )
        )
      ),
      h('div',{style:{background:statusCol+'15',border:`1px solid ${statusCol}30`,borderRadius:10,padding:'8px 12px',textAlign:'center'}},
        h('p',{style:{fontSize:11,color:statusCol,fontWeight:600,margin:0}},statusMsg)
      )
    )
  );
}

function TrainingCalendar({days,selDate,onSelect}){
  const[ref,setRef]=useState(new Date(selDate+'T00:00:00'));
  const yr=ref.getFullYear(),mo=ref.getMonth();

  const cells=[];for(let i=0;i<off;i++)cells.push(null);for(let d=1;d<=dim;d++)cells.push(d);
  const mk=(y,m,d)=>`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  const td=today();
  return h('div',{className:'card'},

      h('div',{style:{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2}},
        cells.map((d,i)=>{

          const dk=mk(yr,mo,d);

  );
}

function SvgLine({series,labels,yMin=0,yMax=100}){

  const el=[];
  [0,.25,.5,.75,1].forEach((t,i)=>el.push(h('line',{key:'g'+i,x1:pL,x2:W-pR,y1:ys(yMin+t*rng),y2:ys(yMin+t*rng),stroke:'#1e1e1e',strokeWidth:1})));

  series.forEach((s,si)=>{

    let d='',open=false;
    pts.forEach(p=>{if(p&&!open){d+=`M${p[0].toFixed(1)},${p[1].toFixed(1)}`;open=true;}else if(p){d+=` L${p[0].toFixed(1)},${p[1].toFixed(1)}`;}else open=false;});
    if(d)el.push(h('path',{key:'p'+si,d,fill:'none',stroke:s.color,strokeWidth:1.8,strokeLinecap:'round',strokeLinejoin:'round',opacity:.9}));

function calcWaterMl(day){
  const manual=day?.water_ml||0;
  const yanga=(day?.nutrition?.meals||[]).reduce((s,m)=>s+(m?.items||[]).filter(it=>/yanga/i.test(it?.name||'')).length*800,0);
  return manual+yanga;
}
function evalAutoHabit(id,day,allDays,refDate){
  const tot=nutTot(day?.nutrition);
  const sl=day?.samsung_health?.sleep;
  if(id==='protein') return tot.protein>=(day?.nutrition?.goal_protein||160);
  if(id==='calories') return tot.kcal>0&&tot.kcal<=(day?.nutrition?.goal_kcal||2300);
  if(id==='trained'){
    if(!allDays||!refDate) return!!day?.training;
    let cnt=0;
    for(let i=0;i<7;i++){
      const d=new Date(refDate+'T00:00:00');d.setDate(d.getDate()-i);
      if(allDays[d.toISOString().split('T')[0]]?.training)cnt++;
    }
    return cnt>=4;
  }
  if(id==='sleep') return(sl?.actual_sleep_hours||0)>=6;
  if(id==='bedtime'){const hh=parseInt((sl?.bedtime||'').split(':')[0],10);return!isNaN(hh)&&(hh>=20||hh===0);}
  if(id==='water') return calcWaterMl(day)>=2500;
  if(id==='milestones'){
    const done=JSON.parse(localStorage.getItem('schoolTasksV2')||'{}');
    const all=[...SCHOOL_TASKS.labo,...SCHOOL_TASKS.theorie];
    return!all.some(t=>ddiff(t.dl)<0&&!done[t.id]);
  }
  return false;
}
function calcStreak(hid,hist,days){
  let s=0;const n=new Date();
  const hab=HABITS.find(x=>x.id===hid);
  for(let i=0;i<365;i++){
    const d=new Date(n);d.setDate(d.getDate()-i);
    const k=d.toISOString().split('T')[0];
    const chk=hab?.auto?evalAutoHabit(hid,days?.[k],days,k):!!hist[k]?.[hid];
    if(chk)s++;else break;
  }
  return s;
}

// ── Planning helpers ──────────────────────────────────────
function clampPct(v){const n=Number(v);if(isNaN(n))return 0;return Math.round(Math.max(0,Math.min(100,n))/5)*5;}
function normTask(t){
  const prog=clampPct(t?.progress_percent??0);
  const done=Boolean(t?.is_completed)||prog>=100;
  return{id:t?.id||uid(),category:(t?.category||'general').trim(),vak:(t?.vak||'').trim(),title:(t?.title||'Nieuwe taak').trim(),description:(t?.description||'').trim(),progress_percent:done?100:prog,is_completed:done,auto_rollover:t?.auto_rollover!==false,priority:t?.priority||'medium'};
}
function calcPlanMeta(tasks){
  const total=tasks.length,comp=tasks.filter(t=>t.is_completed).length;
  const avg=total?Math.round(tasks.reduce((s,t)=>s+clampPct(t.progress_percent),0)/total):0;
  return{total_tasks:total,completed_tasks:comp,overall_progress_percent:avg};
}
function normPlanDay(day,fallback){
  const td2=typeof fallback==='string'?fallback:today();
  const tasks=Array.isArray(day?.tasks)?day.tasks.map(normTask):[];
  return{type:'planning',date:typeof day?.date==='string'&&day.date?day.date:td2,meta:calcPlanMeta(tasks),tasks};
}
function tomorrowOf(ds){const d=new Date(ds+'T00:00:00');d.setDate(d.getDate()+1);return d.toISOString().split('T')[0];}
function latestPlanDay(planDays){
  const entries=Object.values(planDays||{});
  if(!entries.length)return normPlanDay({type:'planning',date:PLAN_SEED_DATE,tasks:PLAN_SEED_TASKS},PLAN_SEED_DATE);
  return entries.map(d=>normPlanDay(d,d?.date||today())).sort((a,b)=>a.date.localeCompare(b.date)).at(-1);
}
function buildRollover(src,newDate){
  const tasks=(src?.tasks||[]).filter(t=>!t.is_completed&&t.auto_rollover).map(t=>normTask({...t,id:uid()}));
  return normPlanDay({type:'planning',date:newDate,tasks},newDate);
}
function prioStyle(p){
  if(p==='high')return{border:'1px solid rgba(251,191,36,.3)',background:'rgba(251,191,36,.1)',color:'#fde68a'};
  if(p==='low')return{border:'1px solid rgba(52,211,153,.3)',background:'rgba(52,211,153,.1)',color:'#6ee7b7'};
  return{border:'1px solid rgba(96,165,250,.3)',background:'rgba(96,165,250,.1)',color:'#bfdbfe'};
}

// ── PlanningTab ───────────────────────────────────────────
const TASK_FORM_INIT={title:'',description:'',category:'taak',vak:'',priority:'normal',auto_rollover:true};
function PlanningTab(){
  const tdStr=today();
  const seedInit={[PLAN_SEED_DATE]:normPlanDay({type:'planning',date:PLAN_SEED_DATE,tasks:PLAN_SEED_TASKS},PLAN_SEED_DATE)};
  const[planDays,setPlanDays]=useLS('planningDaysV2',seedInit);
  const[cpMsg,setCpMsg]=useState('');
  const[impOpen,setImpOpen]=useState(false);
  const[impRaw,setImpRaw]=useState('');
  const[impMsg,setImpMsg]=useState(null);
  const[taskModal,setTaskModal]=useState(false);
  const[editTaskId,setEditTaskId]=useState(null);
  const[taskForm,setTaskForm]=useState(TASK_FORM_INIT);
  const[planCats,setPlanCats]=useLS('planCategories',DEFAULT_PLAN_CATS);
  const[vakken]=useLS('schoolVakken',DEFAULT_VAKKEN);
  const[newCatInput,setNewCatInput]=useState('');

  useEffect(()=>{
    setPlanDays(cur=>{
      if(cur&&cur[tdStr])return cur;
      const src=latestPlanDay(cur);
      return{...(cur||{}),[tdStr]:buildRollover(src,tdStr)};
    });
  },[tdStr]);

  const activeDay=planDays&&planDays[tdStr]?normPlanDay(planDays[tdStr],tdStr):latestPlanDay(planDays);

  function savePlan(nextDay){setPlanDays(cur=>({...cur,[tdStr]:normPlanDay(nextDay,tdStr)}));}
  function toggleTask(id){
    const next=activeDay.tasks.map(t=>t.id===id?normTask({...t,is_completed:!t.is_completed,progress_percent:!t.is_completed?100:0}):t);
    savePlan({...activeDay,tasks:next,meta:calcPlanMeta(next)});
  }
  function changeProgress(id,val){
    const p=clampPct(val);
    const next=activeDay.tasks.map(t=>t.id===id?normTask({...t,progress_percent:p,is_completed:p>=100}):t);
    savePlan({...activeDay,tasks:next,meta:calcPlanMeta(next)});
  }
  function closeDay(){
    const nextDate=tomorrowOf(tdStr);
    setPlanDays(cur=>({...cur,[tdStr]:normPlanDay(activeDay,tdStr),[nextDate]:buildRollover(activeDay,nextDate)}));
  }
  function openAddTask(){setEditTaskId(null);setTaskForm(TASK_FORM_INIT);setTaskModal(true);}
  function openEditTask(task){setEditTaskId(task.id);setTaskForm({title:task.title,description:task.description||'',category:task.category||'taak',vak:task.vak||'',priority:task.priority||'normal',auto_rollover:task.auto_rollover!==false});setTaskModal(true);}
  function deleteTask(id){const next=activeDay.tasks.filter(t=>t.id!==id);savePlan({...activeDay,tasks:next,meta:calcPlanMeta(next)});}
  function saveTaskForm(){
    if(!taskForm.title.trim())return;
    let next;
    if(editTaskId){next=activeDay.tasks.map(t=>t.id===editTaskId?normTask({...t,...taskForm}):t);}
    else{next=[...activeDay.tasks,normTask({...taskForm,id:uid()})];}
    savePlan({...activeDay,tasks:next,meta:calcPlanMeta(next)});
    setTaskModal(false);
  }
  function copyTmpl(){
    const txt=JSON.stringify(PLAN_TMPL,null,2);
    if(navigator.clipboard?.writeText){navigator.clipboard.writeText(txt).then(()=>{setCpMsg('✓ Template gekopieerd!');setTimeout(()=>setCpMsg(''),2200);});}
    else{const el=document.createElement('textarea');el.value=txt;document.body.appendChild(el);el.select();document.execCommand('copy');document.body.removeChild(el);setCpMsg('✓ Template gekopieerd!');setTimeout(()=>setCpMsg(''),2200);}
  }
  function doImport(){
    try{
      const data=JSON.parse(impRaw);
      if(!data||!Array.isArray(data.tasks))throw new Error('tasks array ontbreekt');
      const imp=normPlanDay(data,data.date||tdStr);
      setPlanDays(cur=>({...cur,[imp.date]:imp}));
      setImpMsg({ok:true,msg:'✓ Planning geladen voor '+imp.date});
      setImpRaw('');
      setTimeout(()=>{setImpOpen(false);setImpMsg(null);},1000);
    }catch(e){setImpMsg({ok:false,msg:'✗ '+e.message});}
  }

  return h('div',{className:'anim-fade'},
    // ── Main card ─────────────────────────────────────────
    h('div',{className:'card'},
      h(CardHdr,{title:'Planning',sub:activeDay.meta.completed_tasks+' / '+activeDay.meta.total_tasks+' voltooid · '+activeDay.meta.overall_progress_percent+'% totaal',
        action:h('div',{style:{display:'flex',gap:6,flexWrap:'wrap'}},
          h('button',{onClick:openAddTask,className:'pill-btn',style:{fontSize:10,padding:'4px 11px'}},'+ Nieuwe taak'),
          h('button',{onClick:closeDay,className:'pill-btn',style:{fontSize:10,padding:'4px 11px'}},'📅 Dag afsluiten')
        )}),
      // Day info
      h('div',{style:{margin:'0 1rem .75rem',padding:'10px 14px',borderRadius:'1.25rem',border:'1px solid rgba(255,255,255,.07)',background:'rgba(255,255,255,.03)'}},
        h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:8}},
          h('div',null,
            h('p',{style:{fontSize:9,fontWeight:600,textTransform:'uppercase',letterSpacing:'.28em',color:'rgba(255,255,255,.38)',margin:0}},'Actieve dag'),
            h('p',{style:{fontSize:13,fontWeight:700,color:'#fff',margin:'2px 0 0'}},activeDay.date)
          ),
          h('div',{style:{display:'flex',gap:6}},
            h('span',{style:{fontSize:9,fontWeight:600,textTransform:'uppercase',letterSpacing:'.12em',color:'rgba(255,255,255,.45)',border:'1px solid rgba(255,255,255,.1)',background:'rgba(255,255,255,.04)',padding:'3px 10px',borderRadius:999}},activeDay.meta.total_tasks+' taken'),
            h('span',{style:{fontSize:9,fontWeight:600,textTransform:'uppercase',letterSpacing:'.12em',color:'rgba(255,255,255,.45)',border:'1px solid rgba(255,255,255,.1)',background:'rgba(255,255,255,.04)',padding:'3px 10px',borderRadius:999}},activeDay.meta.completed_tasks+' klaar')
          )
        )
      ),
      // Tasks
      h('div',{style:{padding:'0 1rem 1rem',display:'flex',flexDirection:'column',gap:10}},
        activeDay.tasks.length===0&&h('div',{style:{borderRadius:'1.25rem',border:'1px solid rgba(255,255,255,.07)',background:'rgba(255,255,255,.03)',padding:'2rem',textAlign:'center'}},
          h('p',{style:{fontSize:32,margin:'0 0 8px'}},'📅'),
          h('p',{style:{fontSize:13,color:'rgba(255,255,255,.4)',margin:0}},'Geen taken. Kopieer de template of importeer een JSON.')
        ),
        activeDay.tasks.map(t=>h(PlanTaskRow,{key:t.id,task:t,onToggle:toggleTask,onProgress:changeProgress,onEdit:openEditTask,onDelete:deleteTask}))
      )
    ),
    // ── Task form modal ───────────────────────────────────
    h(Modal,{open:taskModal,onClose:()=>setTaskModal(false),title:editTaskId?'Taak bewerken':'Nieuwe taak'},
      h('label',{style:{display:'block',marginBottom:10}},
        h('span',{style:{fontSize:11,color:'#737373',display:'block',marginBottom:4}},'Naam'),
        h('input',{className:'inp',placeholder:'Taaknaam…',value:taskForm.title,onChange:e=>setTaskForm({...taskForm,title:e.target.value})})
      ),
      h('label',{style:{display:'block',marginBottom:10}},
        h('span',{style:{fontSize:11,color:'#737373',display:'block',marginBottom:4}},'Beschrijving'),
        h('textarea',{className:'inp',style:{minHeight:72,resize:'vertical'},placeholder:'Optionele beschrijving…',value:taskForm.description,onChange:e=>setTaskForm({...taskForm,description:e.target.value})})
      ),
      h('label',{style:{display:'block',marginBottom:10}},
        h('span',{style:{fontSize:11,color:'#737373',display:'block',marginBottom:6}},'Categorie'),
        h('div',{style:{display:'flex',flexWrap:'wrap',gap:5}},
          planCats.map(c=>h('button',{key:c,onClick:()=>setTaskForm({...taskForm,category:c,vak:c==='school'?taskForm.vak:''}),style:{fontSize:11,padding:'4px 11px',borderRadius:999,border:'1px solid',cursor:'pointer',fontFamily:'inherit',fontWeight:600,
            borderColor:taskForm.category===c?'rgba(59,130,246,.5)':'rgba(255,255,255,.1)',
            background:taskForm.category===c?'rgba(59,130,246,.15)':'rgba(255,255,255,.04)',

        h('span',{style:{fontSize:11,color:'#737373',display:'block',marginBottom:6}},'Vak'),
        h('div',{style:{display:'flex',flexWrap:'wrap',gap:5}},
          vakken.map(v=>h('button',{key:v,onClick:()=>setTaskForm({...taskForm,vak:v}),style:{fontSize:11,padding:'4px 11px',borderRadius:999,border:'1px solid',cursor:'pointer',fontFamily:'inherit',fontWeight:600,
            borderColor:taskForm.vak===v?'rgba(96,165,250,.5)':'rgba(255,255,255,.1)',
            background:taskForm.vak===v?'rgba(96,165,250,.15)':'rgba(255,255,255,.04)',
            color:taskForm.vak===v?'#93c5fd':'#737373'}},v))
        )
      ),
      h('label',{style:{display:'block',marginBottom:10}},
        h('span',{style:{fontSize:11,color:'#737373',display:'block',marginBottom:4}},'Prioriteit'),
        h('select',{className:'inp',value:taskForm.priority,onChange:e=>setTaskForm({...taskForm,priority:e.target.value})},

        )
      ),
      h('label',{style:{display:'flex',alignItems:'center',gap:10,marginBottom:14,cursor:'pointer'}},
        h('input',{type:'checkbox',checked:taskForm.auto_rollover,onChange:e=>setTaskForm({...taskForm,auto_rollover:e.target.checked}),style:{width:16,height:16,accentColor:'#3b82f6',cursor:'pointer'}}),

    ),
    // ── Import modal ──────────────────────────────────────
    h(Modal,{open:impOpen,onClose:()=>{setImpOpen(false);setImpMsg(null);},title:'Planning Importeren'},

      h('textarea',{className:'inp',style:{minHeight:180,resize:'vertical',fontFamily:'monospace',fontSize:10},

// ══════════ TAB 8 — SYNC ════════════════════════════════
function SyncTab({days}){
  const[lastExp,setLastExp]=useLS('lastExport',null);
  const[msg,setMsg]=useState('');
  const KEYS=['daysV2','schoolV2','habitsV2','weightLogV2'];
  function doExport(){
    const out={_v:3,_date:new Date().toISOString()};
    KEYS.forEach(k=>{const v=localStorage.getItem(k);if(v&&v!=='undefined')try{out[k]=JSON.parse(v);}catch{}});
    const blob=new Blob([JSON.stringify(out,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download='dashboard_'+today()+'.json';a.click();URL.revokeObjectURL(url);
    setLastExp(new Date().toISOString());setMsg('✓ Backup gedownload!');setTimeout(()=>setMsg(''),2500);
  }
  function doExportClip(){
    const out={_v:3,_date:new Date().toISOString()};
    KEYS.forEach(k=>{const v=localStorage.getItem(k);if(v&&v!=='undefined')try{out[k]=JSON.parse(v);}catch{}});
    navigator.clipboard?.writeText(JSON.stringify(out)).then(()=>{setMsg('✓ Naar klembord gekopieerd!');setTimeout(()=>setMsg(''),2500);}).catch(()=>setMsg('✗ Clipboard niet beschikbaar'));
  }
  // FEAT 6: Coach Export String
  function doExportCoach(){
    const td = today();
    const day = days[td] || {};
    const t = nutTot(day.nutrition);
    const g = {kcal:day.nutrition?.goal_kcal||2300,protein:day.nutrition?.goal_protein||160,carbs:day.nutrition?.goal_carbs||270,fat:day.nutrition?.goal_fat||70};
    const sl = day.samsung_health?.sleep;
    const ac = day.samsung_health?.activity;
    const str = `Datum: ${fmtD(td)} | Kcal: ${t.kcal}/${g.kcal} | Eiwit: ${t.protein}g/${g.protein}g | Vet: ${t.fat}g/${g.fat}g | Slaap: ${sl?.actual_sleep_hours||0}u (Score: ${sl?.score||0}) | Actief: ${ac?.active_minutes||0} min`;
    navigator.clipboard?.writeText(str).then(()=>{setMsg('✓ Coach data gekopieerd!');setTimeout(()=>setMsg(''),2500);}).catch(()=>setMsg('✗ Clipboard niet beschikbaar'));
  }
  function doImport(file){
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const data=JSON.parse(e.target.result);
        KEYS.forEach(k=>{if(data[k]){try{localStorage.setItem(k,JSON.stringify(data[k]));}catch{}notifyKey(k,data[k]);}});
        setMsg('✓ '+KEYS.filter(k=>data[k]).length+' secties geladen!');setTimeout(()=>setMsg(''),3000);
      }catch(err){setMsg('✗ Ongeldig bestand');}
    };reader.readAsText(file);
  }
  const daysSince=lastExp?Math.round((Date.now()-new Date(lastExp).getTime())/86400000):null;
  return h('div',{className:'anim-fade'},
    h('div',{className:'card'},
      h(CardHdr,{title:'Export',sub:'Download al je data als backup'}),
      h('div',{className:'card-p',style:{paddingTop:4,display:'flex',flexDirection:'column',gap:10}},
        lastExp&&h('div',{style:{padding:'8px 12px',background:daysSince>1?'rgba(245,158,11,.1)':'rgba(34,197,94,.08)',border:`1px solid ${daysSince>1?'rgba(245,158,11,.25)':'rgba(34,197,94,.2)'}`,borderRadius:10}},
          h('p',{style:{fontSize:11,color:daysSince>1?'#fbbf24':'#4ade80',fontWeight:600,margin:0}},daysSince>1?'⚠ Laatste backup '+daysSince+' dag(en) geleden':'✓ Vandaag gebackupt')
        ),
        h('button',{onClick:doExport,style:{background:'linear-gradient(135deg,#2563eb,#4f46e5)',color:'#fff',border:'none',borderRadius:12,padding:'14px',cursor:'pointer',fontFamily:'inherit',fontSize:14,fontWeight:700}},'📥 Download backup (.json)'),
        h('button',{onClick:doExportClip,style:{background:'#1a1a1a',color:'#d4d4d4',border:'1px solid #222',borderRadius:12,padding:'12px',cursor:'pointer',fontFamily:'inherit',fontSize:13,fontWeight:600}},'📋 Kopieer naar klembord'),
        h('button',{onClick:doExportCoach,style:{background:'rgba(245,158,11,.1)',color:'#fbbf24',border:'1px solid rgba(245,158,11,.3)',borderRadius:12,padding:'12px',cursor:'pointer',fontFamily:'inherit',fontSize:13,fontWeight:700}},'📋 Kopieer Data voor Coach'),
        msg&&h('p',{style:{fontSize:12,fontWeight:600,color:msg.startsWith('✓')?'#4ade80':'#f87171',margin:0,textAlign:'center'}},msg)
      )
    ),
    h('div',{className:'card'},
      h(CardHdr,{title:'Import',sub:'Laad backup op dit apparaat'}),
      h('div',{className:'card-p',style:{paddingTop:4,display:'flex',flexDirection:'column',gap:10}},
        h('div',{style:{background:'rgba(59,130,246,.08)',border:'1px solid rgba(59,130,246,.2)',borderRadius:10,padding:'12px'}},
          h('p',{style:{fontSize:11,color:'#60a5fa',fontWeight:600,margin:'0 0 6px'}},'📱 Hoe synchroniseren zonder Supabase:'),
          h('ol',{style:{fontSize:11,color:'#737373',margin:0,paddingLeft:18,lineHeight:2}},
            h('li',null,'Exporteer op dit apparaat → download .json'),
            h('li',null,'Verstuur via WhatsApp/mail naar je gsm'),
            h('li',null,'Open het bestand op je gsm → selecteer hieronder')
          )
        ),
        h('label',{style:{display:'block',background:'#1e1e1e',border:'2px dashed #2a2a2a',borderRadius:12,padding:'20px',textAlign:'center',cursor:'pointer'}},
          h('input',{type:'file',accept:'.json',style:{display:'none'},onChange:e=>e.target.files[0]&&doImport(e.target.files[0])}),
          h('p',{style:{fontSize:14,margin:0}},'📂'),
          h('p',{style:{fontSize:12,color:'#737373',margin:'4px 0 0'}},'Klik om backup te selecteren')
        ),
        h('div',{style:{background:'#1a1a1a',borderRadius:10,padding:'10px 12px'}},
          h('p',{style:{fontSize:11,color:'#737373',margin:0}},'💡 Supabase real-time sync is ook actief — wijzigingen verschijnen automatisch op al je apparaten via de cloud.')
        )
      )
    )
  );
}

const TPL_VOEDING={type:'nutrition',date:'YYYY-MM-DD',meal:{name:'Lunch',time:'lunch',items:[{name:'',amount_g:0,protein:0,kcal:0,carbs:0,fat:0}],totals:{protein:0,kcal:0,carbs:0,fat:0}}};
const TPL_TRAINING={type:'training',date:'YYYY-MM-DD',session:{name:'Schouder & Bicep',duration_minutes:60,calories_burned:400,volume_kg:0,sets_total:0,start_time:'09:00',exercises:[{name:'Oefening naam',sets:[{set:'W',weight_kg:0,reps:10},{set:1,weight_kg:0,reps:0}]}]}};
const TPL_GEZOND={type:'samsung_health_full',date:'YYYY-MM-DD',sleep:{actual_sleep_hours:7,bedtime:'23:30',wake_time:'06:30',score:80,score_label:'Goed',score_change:0,hrv_sleep:{average_ms:55,max_ms:70},heart_rate_sleep:{average_bpm:58},factors_sleep_score:{actual_sleep_time:'goed',deep_sleep:'goed',rem_sleep:'goed',rest:'goed',time_to_fall_asleep:'uitstekend'},stages:{awake_percent:5,awake_minutes:20,rem_percent:22,rem_minutes:90,light_percent:50,light_minutes:200,deep_percent:23,deep_minutes:95},naps:[]},energy_score:{score:75,label:'Goed',score_change:2,advice:''},activity:{steps:8000,steps_goal:10000,active_minutes:60,active_minutes_goal:90,calories_activity:400,calories_activity_goal:500,calories_total:2500,distance_km:6,active_hours:1,floors_climbed:0}};
function TplBar({label,tpl}){
  const[msg,setMsg]=useState('');
  function copy(){
    const txt=JSON.stringify(tpl,null,2);
    if(navigator.clipboard?.writeText){navigator.clipboard.writeText(txt).then(()=>{setMsg('✓ Template gekopieerd!');setTimeout(()=>setMsg(''),2200);});}
    else{const el=document.createElement('textarea');el.value=txt;document.body.appendChild(el);el.select();document.execCommand('copy');document.body.removeChild(el);setMsg('✓ Template gekopieerd!');setTimeout(()=>setMsg(''),2200);}
  }
  return h('div',{className:'glass-bar'},
    h('p',{style:{fontSize:9,fontWeight:700,textTransform:'uppercase',letterSpacing:'.28em',color:'rgba(255,255,255,.38)',margin:0}},label),
    h('button',{onClick:copy,className:'pill-btn'},'📋 Kopieer JSON Template'),
    msg&&h('p',{style:{fontSize:10,color:'#4ade80',margin:'4px 0 0',width:'100%'}},msg)
  );
}

const TABS=[
  {id:'vandaag', lbl:'Vandaag',   icon:'📊'},
  {id:'voeding', lbl:'Voeding',   icon:'🥗'},
  {id:'training',lbl:'Training',  icon:'💪'},
  {id:'gezond',  lbl:'Gezondheid',icon:'😴'},
  {id:'goals',   lbl:'Goals',     icon:'🎯'},
  {id:'school',  lbl:'School',    icon:'🎓'},
  {id:'planning',lbl:'Planning',  icon:'📅'},
  {id:'sync',    lbl:'Sync',      icon:'💾'},
];
function App(){
  const[tab,setTab]=useState('vandaag');
  const[days,setDays]=useLS('daysV2',{});
  const syncSt=useSyncSt();
  useEffect(()=>{initSync();},[]);
  const now=new Date(),hr=now.getHours();
  const greeting=hr<12?'Goedemorgen':hr<18?'Goedenmiddag':'Goedenavond';
  const dateLbl=now.toLocaleDateString('nl-BE',{weekday:'long',day:'numeric',month:'long'});
  const dot=syncSt==='idle'?null:h('div',{style:{width:7,height:7,borderRadius:'50%',flexShrink:0,background:{syncing:'#f59e0b',synced:'#22c55e',error:'#ef4444'}[syncSt],boxShadow:syncSt==='synced'?'0 0 8px rgba(34,197,94,.6)':syncSt==='syncing'?'0 0 6px rgba(245,158,11,.4)':'none',animation:syncSt==='syncing'?'pulse .8s infinite':'none'}});
  return h('div',{style:{minHeight:'100vh',color:'#fff',fontFamily:'Inter,system-ui,sans-serif'}},
    h('header',{style:{position:'sticky',top:0,zIndex:40,background:'rgba(5,7,12,.75)',backdropFilter:'blur(24px)',WebkitBackdropFilter:'blur(24px)',borderBottom:'1px solid rgba(255,255,255,.07)'}},
      h('div',{style:{maxWidth:920,margin:'0 auto',padding:'0 16px'}},
        h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'13px 0'}},
          h('div',null,h('p',{style:{fontSize:10,color:'rgba(255,255,255,.38)',textTransform:'capitalize',letterSpacing:'.06em',margin:0}},dateLbl),h('h1',{style:{fontSize:17,fontWeight:800,letterSpacing:'-.02em',margin:'3px 0 0'}},greeting+', ',h('span',{style:{background:'linear-gradient(90deg,#38bdf8,#93c5fd)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}},'Jonas'),' 👊')),
          h('div',{style:{display:'flex',alignItems:'center',gap:8}},dot,h('div',{style:{width:36,height:36,borderRadius:'50%',background:'linear-gradient(135deg,rgba(56,189,248,.25),rgba(79,70,229,.25))',border:'1px solid rgba(255,255,255,.1)',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800,fontSize:13}},'J'))
        )
      )
    ),
    h('main',{style:{maxWidth:920,margin:'0 auto',padding:'14px 16px 140px'}},
      tab==='vandaag' &&h(VandaagTab,{days,setTab}),
      tab==='voeding' &&h(VoedingTab,{days, setDays}), // Added setDays for deletion
      tab==='training'&&h(TrainingTab,{days}),
      tab==='gezond'  &&h(GezondheidsTab,{days}),
      tab==='goals'   &&h(GoalsTab,{days,setDays}),
      tab==='school'  &&h(SchoolTab,null),
      tab==='planning'&&h(PlanningTab,null),
      tab==='sync'    &&h(SyncTab,{days})
    ),
    h(FloatingImport,{days,setDays}),
    h('nav',{style:{position:'fixed',bottom:14,left:0,right:0,zIndex:40,display:'flex',justifyContent:'center',padding:'0 8px',pointerEvents:'none'}},
      h('div',{style:{pointerEvents:'auto',borderRadius:999,border:'1px solid rgba(255,255,255,.1)',background:'rgba(5,7,12,.78)',backdropFilter:'blur(28px)',WebkitBackdropFilter:'blur(28px)',padding:'6px 8px',boxShadow:'0 30px 80px rgba(0,0,0,.55)',overflowX:'auto',maxWidth:'calc(100vw - 16px)'}},
        h('div',{style:{display:'flex',alignItems:'stretch',gap:3,minWidth:'max-content'}},
          TABS.map(t=>h('button',{key:t.id,onClick:()=>setTab(t.id),style:{flex:'0 0 auto',display:'flex',flexDirection:'column',alignItems:'center',gap:3,padding:'8px 10px',border:'none',borderRadius:999,background:tab===t.id?'rgba(255,255,255,.12)':'none',color:tab===t.id?'#fff':'rgba(255,255,255,.4)',cursor:'pointer',fontFamily:'inherit',transition:'all .15s',boxShadow:tab===t.id?'0 0 20px rgba(255,255,255,.05)':'none'}},h('span',{style:{fontSize:14}},t.icon),h('span',{style:{fontSize:'7.5px',fontWeight:700,letterSpacing:'.1em',textTransform:'uppercase',whiteSpace:'nowrap'}},t.lbl)))
        )
      )
    )
  );
}
createRoot(document.getElementById('root')).render(h(App));
</script>
